<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBK SMK Syed Sirajuddin Perlis</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00e5ff;
            --secondary-glow: #ff4081;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden; /* Elakkan scroll melintang */
            font-family: 'Quicksand', sans-serif;
            perspective: 1000px;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }

        /* 3D Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px 20px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 
                        inset 0 0 15px rgba(255,255,255,0.1);
            transform: rotateX(5deg) rotateY(-5deg);
            transition: transform 0.5s ease;
            position: relative;
            z-index: 10;
        }

        .glass-card:hover {
            transform: rotateX(0deg) rotateY(0deg) scale(1.01);
        }

        /* Gaya Logo */
        .school-logo {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 2.5rem;
            text-shadow: 0 0 15px var(--primary-glow);
            margin-bottom: 10px;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        h2 {
            font-family: 'Quicksand', sans-serif;
            color: #ffd180;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .quote {
            color: #e0f7fa;
            font-style: italic;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 35px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            padding: 0 10px;
        }

        .btn-enter {
            position: relative;
            padding: 12px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #fff;
            background: linear-gradient(45deg, #ff4081, #00e5ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: inline-block;
        }

        .btn-enter:hover {
            box-shadow: 0 0 30px var(--primary-glow);
            transform: translateY(-3px);
        }

        /* Responsive Settings */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            h2 { font-size: 0.9rem; }
            .quote { font-size: 0.9rem; }
            .school-logo { width: 80px; }
            .glass-card { padding: 30px 15px; transform: none; }
            .glass-card:hover { transform: scale(1.01); }
            .flower { font-size: 30px; }
        }

        /* Bunga Beralun Statik */
        .flower {
            position: absolute;
            font-size: 45px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            animation: swayRotate 6s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes swayRotate {
            0% { transform: translateY(0) rotate(0deg) translateX(0); }
            25% { transform: translateY(-10px) rotate(20deg) translateX(15px); }
            50% { transform: translateY(0) rotate(-15deg) translateX(-10px); }
            75% { transform: translateY(10px) rotate(10deg) translateX(15px); }
            100% { transform: translateY(0) rotate(0deg) translateX(0); }
        }

        #particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div id="particles"></div>
    <div class="overlay"></div>

    <div class="flower" style="top: 5%; left: 5%; animation-delay: 0s;">🌸</div>
    <div class="flower" style="top: 10%; right: 5%; animation-delay: 1s;">🌼</div>
    <div class="flower" style="bottom: 10%; left: 5%; animation-delay: 2s;">🌻</div>
    <div class="flower" style="bottom: 5%; right: 5%; animation-delay: 3s;">🌷</div>

    <div class="glass-card">
        <img src="LOGO SEMSIRA.png" alt="Logo SMKSS" class="school-logo">
        
        <h1>SELAMAT DATANG</h1>
        <h2>LAMAN SESAWANG UNIT BIMBINGAN DAN KAUNSELING<br>SMK SYED SIRAJUDDIN PERLIS</h2>
        
        <div style="width: 60px; height: 3px; background: linear-gradient(to right, var(--secondary-glow), var(--primary-glow)); margin: 0 auto 20px;"></div>
        
        <p class="quote">
            "Setiap hati ada ceritanya, setiap jiwa ada kekuatannya. <br>
            Di sini, kami mendengar bukan sekadar dengan telinga, <br>
            tetapi dengan seikhlas jiwa. Anda tidak pernah sendirian."
        </p>

        <a href="portal-utama.html" class="btn-enter">JEMPUT MASUK</a>
    </div>

    <script>
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = Math.random() * 4 + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = 'white';
            particle.style.borderRadius = '50%';
            particle.style.top = Math.random() * 100 + 'vh';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.opacity = Math.random();
            particle.style.filter = 'blur(1px)';
            particle.style.boxShadow = '0 0 8px white';
            container.appendChild(particle);
        }
    </script>

</body>
</html>
