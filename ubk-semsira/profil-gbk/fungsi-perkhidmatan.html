<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fungsi Perkhidmatan | UBK SEMSIRA</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600&family=Orbitron:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --iphone-blue: #0071e3;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #54d6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #001d3d, #000000);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            color: white;
            overflow: hidden;
            perspective: 1500px;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--accent);
            letter-spacing: 2px;
            padding: 0 20px;
        }

        /* Card Container */
        .slider-container {
            position: relative;
            width: 320px;
            height: 400px; /* Sedikit pendek untuk bagi ruang button */
            transform-style: preserve-3d;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            user-select: none;
            opacity: 0;
            pointer-events: none;
            transform: translateZ(-100px) rotateY(10deg);
        }

        .card.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateZ(0) rotateY(0);
        }

        .card.prev {
            opacity: 0.5;
            transform: translateX(-100%) rotateY(-20deg) scale(0.8);
        }

        .card.next {
            opacity: 0.5;
            transform: translateX(100%) rotateY(20deg) scale(0.8);
        }

        .card-icon {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .card-number {
            font-size: 0.8rem;
            background: var(--iphone-blue);
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .card-text {
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 600;
        }

        /* Navigation Buttons */
        .nav-btns {
            display: flex;
            gap: 40px;
            margin-top: 30px;
            z-index: 100;
        }

        .nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(84, 214, 255, 0.2);
        }

        .nav-btn:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 25px var(--accent);
            transform: scale(1.1);
        }

        /* Button Kembali - Flexible & Fit */
        .btn-back {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            backdrop-filter: blur(10px);
            display: inline-block;
            text-align: center;
        }

        .btn-back:hover {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent);
            transform: translateY(-3px);
        }

        /* Background Glow Animation */
        .glow-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.2), transparent);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        /* Responsive Fix untuk skrin pendek */
        @media (max-height: 700px) {
            .slider-container { height: 320px; }
            h1 { font-size: 1.5rem; margin-bottom: 15px; }
            .card-icon { font-size: 40px; }
            .card-text { font-size: 0.9rem; }
            .btn-back { margin-top: 20px; padding: 10px 25px; }
        }
    </style>
</head>
<body>

    <div class="glow-sphere"></div>
    <h1>20 FUNGSI PERKHIDMATAN</h1>

    <div class="slider-container" id="cardStack"></div>

    <div class="nav-btns">
        <button class="nav-btn" onclick="prevCard()">❮</button>
        <button class="nav-btn" onclick="nextCard()">❯</button>
    </div>

    <a href="../profil-gbk.html" class="btn-back">KEMBALI KE PROFIL</a>

    <script>
        const fungsiList = [
            { icon: "🤝", text: "Menyediakan perkhidmatan bimbingan dan kaunseling secara individu." },
            { icon: "👥", text: "Menjalankan sesi kaunseling kelompok bagi berkongsi isu bersama." },
            { icon: "🛡️", text: "Melaksanakan program pencegahan masalah disiplin dan salah laku." },
            { icon: "🧠", text: "Memberi tumpuan kepada kesejahteraan mental dan emosi murid." },
            { icon: "📈", text: "Membantu murid meningkatkan motivasi diri dalam akademik." },
            { icon: "🎓", text: "Memberi pendedahan kerjaya dan hala tuju pendidikan tinggi." },
            { icon: "✍️", text: "Melaksanakan pentadbiran ujian psikometrik untuk kenal potensi diri." },
            { icon: "🏠", text: "Menjalankan lawatan ke rumah bagi kes-kes murid tertentu." },
            { icon: "📢", text: "Menyampaikan info bimbingan melalui hebahan dan papan buletin." },
            { icon: "💡", text: "Membimbing murid dalam teknik kemahiran belajar yang berkesan." },
            { icon: "⚖️", text: "Membentuk sahsiah dan nilai murni dalam diri murid." },
            { icon: "🚫", text: "Menjalankan intervensi untuk kes buli dan risiko sosial." },
            { icon: "🕊️", text: "Membantu murid menguruskan tekanan (stress) dan konflik emosi." },
            { icon: "👨‍👩‍👧", text: "Menjalankan sesi konsultasi bersama ibu bapa dan guru." },
            { icon: "🌟", text: "Membangunkan potensi pemimpin muda melalui PRS (Pembimbing Rakan Sebaya)." },
            { icon: "🧩", text: "Membantu murid membuat keputusan yang rasional dan bijak." },
            { icon: "🔍", text: "Mengenal pasti murid yang memerlukan sokongan emosi kritikal." },
            { icon: "📱", text: "Mendidik murid tentang etika penggunaan media sosial yang sihat." },
            { icon: "🔥", text: "Membina daya tahan murid dalam menghadapi cabaran remaja." },
            { icon: "📖", text: "Memastikan kerahsiaan murid sentiasa terjaga secara profesional." }
        ];

        let currentIndex = 0;
        const stack = document.getElementById('cardStack');

        function createCards() {
            fungsiList.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `card ${index === 0 ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="card-number">Fungsi ${index + 1} / 20</div>
                    <div class="card-icon">${item.icon}</div>
                    <div class="card-text">${item.text}</div>
                `;
                stack.appendChild(card);
            });
        }

        function updateCards() {
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                card.classList.remove('active', 'prev', 'next');
                if (index === currentIndex) {
                    card.classList.add('active');
                } else if (index === currentIndex - 1) {
                    card.classList.add('prev');
                } else if (index === currentIndex + 1) {
                    card.classList.add('next');
                }
            });
        }

        function nextCard() {
            if (currentIndex < fungsiList.length - 1) {
                currentIndex++;
                updateCards();
            } else {
                currentIndex = 0; 
                updateCards();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCards();
            } else {
                currentIndex = fungsiList.length - 1; 
                updateCards();
            }
        }

        // Make functions global for onclick
        window.nextCard = nextCard;
        window.prevCard = prevCard;

        createCards();
    </script>
</body>
</html>
