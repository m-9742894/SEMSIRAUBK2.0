    // Fungsi untuk mendapatkan data kerjaya berdasarkan nama kerjaya
    function getKerjayaData(kerjayaNama) {
        if (!kerjayaNama) {
            return {
                unit: "TIDAK DIKENAL PASTI",
                syaratAm: "Sila rujuk kaunselor untuk maklumat lanjut.",
                syaratKhas: "Sila rujuk kaunselor untuk maklumat lanjut.",
                universiti: [{ nama: "Sila rujuk kaunselor", program: "Maklumat akan dikemaskini", tahap: "-", tempoh: "-", yuran: "-" }],
                mandat: "SASARAN SPM: Pastikan 5 Kepujian dalam subjek teras."
            };
        }
        
        // Cari padanan tepat
        for (let [key, value] of Object.entries(kerjayaDatabase)) {
            if (kerjayaNama.toUpperCase().includes(key.toUpperCase()) || key.toUpperCase().includes(kerjayaNama.toUpperCase())) {
                return value;
            }
        }
        
        // Cari padanan separa untuk kerjaya yang mungkin ditulis berbeza
        const kerjayaUpper = kerjayaNama.toUpperCase();
        if (kerjayaUpper.includes("JURUTERA AWAM")) return kerjayaDatabase["JURUTERA AWAM"];
        if (kerjayaUpper.includes("MEKANIKAL")) return kerjayaDatabase["KEJURUTERAAN MEKANIKAL"];
        if (kerjayaUpper.includes("ROBOT")) return kerjayaDatabase["PAKAR ROBOTIK"];
        if (kerjayaUpper.includes("AERO")) return kerjayaDatabase["JURUTERA AEROANGKASA"];
        if (kerjayaUpper.includes("BIOPER")) return kerjayaDatabase["KEJURUTERAAN BIOPERUBATAN"];
        if (kerjayaUpper.includes("PERTANIAN")) return kerjayaDatabase["PERTANIAN MODEN"];
        if (kerjayaUpper.includes("SAINTIS")) return kerjayaDatabase["SAINTIS PENYELIDIK"];
        if (kerjayaUpper.includes("DOKTOR")) return kerjayaDatabase["DOKTOR PAKAR"];
        if (kerjayaUpper.includes("DATA")) return kerjayaDatabase["PAKAR ANALISIS DATA"];
        if (kerjayaUpper.includes("FORENSIK")) return kerjayaDatabase["PAKAR FORENSIK"];
        if (kerjayaUpper.includes("SIBER")) return kerjayaDatabase["PAKAR KESELAMATAN SIBER"];
        if (kerjayaUpper.includes("FARMASI")) return kerjayaDatabase["AHLI FARMASI"];
        if (kerjayaUpper.includes("GRAFIK")) return kerjayaDatabase["PEREKA GRAFIK DIGITAL"];
        if (kerjayaUpper.includes("PENGARAH")) return kerjayaDatabase["PENGARAH SENI"];
        if (kerjayaUpper.includes("PENULIS")) return kerjayaDatabase["PENULIS KREATIF"];
        if (kerjayaUpper.includes("UX") || kerjayaUpper.includes("UI")) return kerjayaDatabase["PEREKA UX/UI"];
        if (kerjayaUpper.includes("MUZIK") || kerjayaUpper.includes("KOMPOSER")) return kerjayaDatabase["KOMPOSER MUZIK"];
        if (kerjayaUpper.includes("ARKITEK")) return kerjayaDatabase["ARKITEK"];
        if (kerjayaUpper.includes("GURU")) return kerjayaDatabase["GURU"];
        if (kerjayaUpper.includes("KAUNSELOR")) return kerjayaDatabase["KAUNSELOR"];
        if (kerjayaUpper.includes("JURURAWAT")) return kerjayaDatabase["JURURAWAT"];
        if (kerjayaUpper.includes("KEBAJIKAN")) return kerjayaDatabase["PEGAWAI KEBAJIKAN"];
        if (kerjayaUpper.includes("PR") || kerjayaUpper.includes("HUBUNGAN AWAM")) return kerjayaDatabase["PEGAWAI PR"];
        if (kerjayaUpper.includes("USAHAWAN")) return kerjayaDatabase["USAHAWAN"];

        // Default fallback

    function formatSyarat(syarat) {
        if (!syarat) return '-';
        return syarat.replace(/\n/g, '<br>');
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function formatDate(timestamp) {
        if (!timestamp) return 'Tarikh tidak tersedia';
        try {
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleString('ms-MY', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        } catch(e) {
            return 'Tarikh tidak sah';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

                .title-line { width: 50px; height: 3px; background: #38bdf8; margin-bottom: 20px; }
                .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
                .card { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; }
                .card h4 { font-size: 9px; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
                .card p { font-size: 13px; font-weight: 700; }
                .mandate-highlight { background: #fffbeb; border: 2px solid #fef3c7; padding: 15px; border-radius: 15px; margin-top: 15px; }
                .uni-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 10px; }
                .uni-table th { background: #1e293b; color: white; padding: 10px; font-size: 9px; }
                .uni-table td { border: 1px solid #e2e8f0; padding: 8px; }
                .quote-wrap { text-align: center; padding: 50px 20px; }
                .big-quote { font-family: 'Great Vibes', cursive; font-size: 40px; color: #1e293b; }
                .author { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: #38bdf8; margin-top: 10px; }
                .tracker-table, .schedule-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
                .tracker-table th, .schedule-table th { background: #1e293b; color: white; padding: 10px; font-size: 9px; }
                .tracker-table td, .schedule-table td { border: 1px solid #cbd5e1; padding: 8px; text-align: center; height: 60px; }
                @media print {
                    body { background: white; }
                    .a4-page { margin: 0; box-shadow: none; page-break-after: always; }
                }
            </style>
        </head>
        <body>
            <div class="a4-page">
                <div class="page-header"><div class="brand-logo">SEMSIRA / 2026</div><div>P.01</div></div>
                <div class="title-block"><h1>Profil & Matlamat</h1><div class="title-line"></div></div>
                <div class="grid-info">
                    <div class="card"><h4>Nama Calon</h4><p>${escapeHtml(order.nama)}</p></div>
                    <div class="card"><h4>Dominasi RIASEC</h4><p>${escapeHtml(kerjayaData.unit)}</p></div>
                </div>
                <div class="card" style="margin-bottom: 15px;">
                    <h4>Kerjaya Impian Utama</h4>
                    <p style="font-size: 16px; color: #0369a1; font-weight: bold;">${escapeHtml(order.kerjayaImpian || 'Tidak dipilih')}</p>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="card"><h4>Syarat Am</h4><div style="font-size: 11px; line-height: 1.5;">${formatSyarat(kerjayaData.syaratAm)}</div></div>
                    <div class="card"><h4>Syarat Khas</h4><div style="font-size: 11px; line-height: 1.5;">${formatSyarat(kerjayaData.syaratKhas)}</div></div>
                </div>
                <div class="mandate-highlight">
                    <h5 style="color: #b45309; font-size: 11px;"><i class="fas fa-award"></i> MANDAT AKADEMIK (SASARAN SUBJEK SPM)</h5>
                    <div style="font-size: 12px; font-weight: 600;">${escapeHtml(kerjayaData.mandat)}</div>
                </div>
            </div>
            
            <div class="a4-page">
                <div class="page-header"><div class="brand-logo">SEMSIRA / 2026</div><div>P.02</div></div>
                <div class="title-block"><h1>Destinasi Pendidikan</h1><div class="title-line"></div></div>
                <div class="card">
                    <h4>Senarai Institusi & Program Pengajian</h4>
                    <table class="uni-table">
                        <thead><tr><th>Institusi & Lokasi</th><th>Program Pengajian</th><th>Tahap</th><th>Tempoh</th><th>Yuran/Sem</th></tr></thead>
                        <tbody>${universitiRows}</tbody>
                    </table>
                </div>
            </div>
            
            <div class="a4-page">
                <div class="page-header"><div class="brand-logo">SEMSIRA / 2026</div><div>P.03</div></div>
                <div class="title-block"><h1>Tracker Prestasi</h1><div class="title-line"></div></div>
                <table class="tracker-table">
                    <thead><tr><th>UJIAN</th><th>BM</th><th>BI</th><th>SEJ</th><th>MATE</th><th>ELEKTIF 1</th><th>ELEKTIF 2</th></tr></thead>
                    <tbody>
                        <tr><td><strong>UJIAN 1</strong></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        <tr><td><strong>UJIAN 2</strong></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        <tr><td><strong>UJIAN 3</strong></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="a4-page">
                <div class="page-header"><div class="brand-logo">SEMSIRA / 2026</div><div>P.04</div></div>
                <div class="title-block"><h1>Jadual Perancangan</h1><div class="title-line"></div></div>
                <table class="schedule-table">
                    <thead><tr><th>WAKTU</th><th>ISNIN</th><th>SELASA</th><th>RABU</th><th>KHAMIS</th><th>JUMAAT</th><th>SABTU</th><th>AHAD</th></tr></thead>
                    <tbody>
                        <tr><td><strong>PAGI</strong></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        <tr><td><strong>PETANG</strong></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        <tr><td><strong>MALAM</strong></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="a4-page">
                <div class="quote-wrap">
                    <p class="big-quote">"Masa depan adalah milik mereka yang percaya pada keindahan impian mereka."</p>
                    <p class="author">— Eleanor Roosevelt —</p>
                    <div style="margin-top: 30px; color: #64748b; font-size: 14px;">
                        Teruskan berjuang, calon <b>${escapeHtml(order.kerjayaImpian || 'kecemerlangan')}</b>!
                    </div>
                </div>
            </div>
        </body>
        </html>`;
        
        const printWindow = window.open('', '_blank');
        printWindow.document.write(diariHTML);
        printWindow.document.close();
        printWindow.onload = () => { printWindow.print(); };
    }

    async function completeOrder(orderId) {
        if (!confirm('Pastikan pelajar sudah menerima diari fizikal. Tandakan sebagai SELESAI dan hapuskan tempahan ini?')) return;
        try {
            await db.collection('tempahanDiari').doc(orderId).delete();
            showToast('✅ Tempahan telah diselesaikan!', 'success');
            loadOrders();
        } catch (error) {
            showToast('❌ Gagal menyelesaikan tempahan.', 'error');
        }
    }

    function displayOrders(orders) {
        const container = document.getElementById('ordersContainer');
        if (!orders || orders.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox" style="font-size: 3rem;"></i><p>Tiada tempahan diari buat masa ini.</p></div>`;
            document.getElementById('totalMenunggu').innerText = '0';
            document.getElementById('totalKeseluruhan').innerText = '0';
            return;
        }
        
        document.getElementById('totalKeseluruhan').innerText = orders.length;
        document.getElementById('totalMenunggu').innerText = orders.length;
        
        container.innerHTML = `<div class="orders-grid">${orders.map(order => `
            <div class="order-card">
                <div class="order-status"><i class="fas fa-hourglass-half"></i> MENUNGGU</div>
                <div class="order-header">
                    <i class="fas fa-user-graduate"></i>
                    <div>
                        <h3>${escapeHtml(order.nama)}</h3>
                        <p style="font-size: 0.7rem; color: #64748b;">ID: ${order.receiptNo || order.id.slice(-8)}</p>
                    </div>
                </div>
                <div class="order-details">
                    <div class="detail-row"><span><i class="fas fa-school"></i> Kelas:</span><span>${escapeHtml(order.kelas)}</span></div>
                    <div class="detail-row"><span><i class="fas fa-phone"></i> No. Telefon:</span><span>${escapeHtml(order.telefon)}</span></div>
                    <div class="detail-row"><span><i class="fas fa-calendar"></i> Tarikh Tempah:</span><span>${order.tarikhDisplay || formatDate(order.tarikh)}</span></div>
                    <div class="detail-row"><span><i class="fas fa-briefcase"></i> Kerjaya Impian:</span><span>${escapeHtml(order.kerjayaImpian || '-')}</span></div>
                </div>
                <div class="order-actions">
                    <button class="btn-print" onclick="printFullDiaryWindow('${order.id}')"><i class="fas fa-print"></i> Cetak Diari</button>
                    <button class="btn-done" onclick="completeOrderWindow('${order.id}')"><i class="fas fa-check"></i> Selesai</button>
                </div>
            </div>
        `).join('')}</div>`;
    }

    window.printFullDiaryWindow = function(orderId) {
        const order = allOrders.find(o => o.id === orderId);
        if (order) printFullDiary(order);
    };
    window.completeOrderWindow = completeOrder;

    function filterOrders(searchTerm) {
        if (!searchTerm.trim()) { displayOrders(allOrders); return; }
        const term = searchTerm.toLowerCase();
        const filtered = allOrders.filter(order => 
            order.nama?.toLowerCase().includes(term) || order.kelas?.toLowerCase().includes(term));
        displayOrders(filtered);
    }

    function updateSuggestions(searchTerm) {
        const suggestionsDiv = document.getElementById('suggestionsList');
        if (!searchTerm.trim()) { suggestionsDiv.style.display = 'none'; return; }
        const term = searchTerm.toLowerCase();
        const matches = allOrders.filter(order => 
            order.nama?.toLowerCase().includes(term) || order.kelas?.toLowerCase().includes(term)).slice(0, 8);
        if (matches.length === 0) { suggestionsDiv.style.display = 'none'; return; }
        suggestionsDiv.innerHTML = matches.map(match => `
            <div onclick="selectSuggestion('${match.id}')">
                <div class="suggestion-name">${escapeHtml(match.nama)}</div>
                <div class="suggestion-detail">${escapeHtml(match.kelas)} • ${escapeHtml(match.kerjayaImpian || 'Tiada kerjaya')}</div>
            </div>
        `).join('');
        suggestionsDiv.style.display = 'block';
    }

    window.selectSuggestion = function(orderId) {
        const order = allOrders.find(o => o.id === orderId);
        if (order) {
            document.getElementById('searchInput').value = order.nama;
            document.getElementById('suggestionsList').style.display = 'none';
            filterOrders(order.nama);
        }
    };

    function loadOrders() {
        const container = document.getElementById('ordersContainer');
        container.innerHTML = `<div class="loading-state"><i class="fas fa-spinner fa-spin"></i><p>Memuatkan tempahan diari...</p></div>`;
        db.collection('tempahanDiari').orderBy('tarikh', 'desc').get().then((snapshot) => {
            allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            displayOrders(allOrders);
        }).catch((error) => {
            console.error("Error loading orders:", error);
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Gagal memuatkan data.</p></div>`;
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        updateSuggestions(e.target.value);
        filterOrders(e.target.value);
    });
    document.addEventListener('click', function(e) {
        const wrapper = document.querySelector('.search-wrapper');
        if (wrapper && !wrapper.contains(e.target)) {
            document.getElementById('suggestionsList').style.display = 'none';
        }
    });
    document.getElementById('refreshBtn').addEventListener('click', () => loadOrders());
    
    loadOrders();
</script>
</body>
</html>
