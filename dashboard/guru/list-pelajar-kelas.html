<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">

    <title>Senarai Pelajar | E-MindCare SEMSIRA</title>

    <style>

        .today-status-card.lewat { background: linear-gradient(135deg, #fef3c7, #fde68a); border-left: 4px solid #f59e0b; }

</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-users"></i></div>
            <div class="logo-text">
                <h1>Senarai Pelajar</h1>
                <p>Urus data pelajar mengikut kelas & tahun</p>
            </div>
        </div>
        <a href="dashboard-guru.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
    </div>
    
    <div id="alertMessage" class="alert"></div>
    
    <div class="settings-card">
        <div class="settings-left">
            <div class="settings-item">
                <i class="fas fa-chalkboard"></i>
                <span class="label">Kelas:</span>
                <span class="value" id="displayClass">-</span>
            </div>
            <div class="settings-item">
                <i class="fas fa-calendar"></i>
                <span class="label">Tahun/Sesi:</span>
                <span class="value" id="displayYear">-</span>
            </div>
        </div>
    </div>
    
    <div class="stats">
        <div class="stat-card"><i class="fas fa-user-graduate"></i><div class="number" id="totalStudents">0</div><div class="label">Jumlah Pelajar</div></div>
        <div class="stat-card"><i class="fas fa-star"></i><div class="number" id="totalClassMerit">0</div><div class="label">Jumlah Merit Kelas</div></div>
        <div class="stat-card"><i class="fas fa-trophy"></i><div class="number" id="averageMerit">0</div><div class="label">Purata Merit</div></div>
    </div>
    
    <div id="mainContent">
        <div class="action-bar">
            <button class="btn-add" id="addStudentBtn"><i class="fas fa-plus"></i> Tambah Pelajar Baru</button>
            <button class="btn-transfer" id="transferStudentsBtn"><i class="fas fa-exchange-alt"></i> Pindah Pelajar ke Tahun Baru</button>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Cari nama atau No. Kad Pengenalan...">
        </div>
        
        <div id="studentsContainer">
            <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Memuatkan...</div>
        </div>

</div>

<!-- Hidden Print Container -->
<div id="printContainer" style="display: none;"></div>

<!-- Modal Transfer -->
<div id="transferModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-exchange-alt"></i> Pindah Pelajar ke Tahun Baru</h3>
            <button class="modal-close" onclick="closeTransferModal()">&times;</button>

        <div class="modal-body">
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Pilih Tahun Baru</label>
                <input type="text" id="targetYear" placeholder="cth: 2027" value="2027">
            </div>
            <div class="form-group">
                <label><i class="fas fa-chalkboard"></i> Kelas Baru (Optional)</label>
                <input type="text" id="targetClass" placeholder="Biarkan kosong jika sama">
            </div>
            <button class="modal-btn" id="confirmTransferBtn"><i class="fas fa-copy"></i> Salin ke Tahun Baru</button>
        </div>
    </div>
</div>

<!-- Modal Add/Edit Student -->
<div id="studentModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle"><i class="fas fa-user-plus"></i> Tambah Pelajar</h3>
            <button class="modal-close" onclick="closeStudentModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nama Penuh</label>
                    <input type="text" id="fullname" placeholder="cth: Ahmad bin Abdullah" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Nombor Kad Pengenalan</label>
                    <input type="text" id="icNumber" placeholder="cth: 050101-01-1234" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-school"></i> Kelas</label>
                    <input type="text" id="className" placeholder="cth: 5 Cemerlang" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> Tahun/Sesi</label>
                    <input type="text" id="session" placeholder="cth: 2024, 2025, 2026" value="2026">

                <button type="submit" class="modal-btn"><i class="fas fa-save"></i> Simpan</button>

        </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyCfu7XC8pXtpDyQ-9Cjdg4AobA-EVEwWcc",
        authDomain: "e-mindcare.firebaseapp.com",
        projectId: "e-mindcare",
        storageBucket: "e-mindcare.firebasestorage.app",
        messagingSenderId: "1021883944936",
        appId: "1:1021883944936:web:39c75a0c98d19a37afde5d",
        measurementId: "G-3CJVKWGEXV"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const studentsCollection = collection(db, "students");
    const meritCollection = collection(db, "merit_records");
    const attendanceRef = collection(db, "attendance_records");
    
    let currentClass = sessionStorage.getItem('teacherClass') || '';
    let currentYear = sessionStorage.getItem('teacherYear') || '2026';
    let studentsList = [];
    let allMeritRecords = [];
    let allAttendanceRecords = [];
    let searchTerm = '';
    let pendingDeleteId = null;
    let pendingDeleteName = null;
    
    function showAlert(msg, type) {
        const alertDiv = document.getElementById('alertMessage');
        alertDiv.textContent = msg;
        alertDiv.className = `alert ${type}`;
        setTimeout(() => { alertDiv.style.display = 'none'; }, 4000);
    }
    
    function escapeHtml(str) { 
        if (!str) return ''; 
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); 
    }
    
    async function loadAllData() {
        try {
            const teacherClass = sessionStorage.getItem('teacherClass') || '';
            const teacherYear = sessionStorage.getItem('teacherYear') || currentYear;
            
            const q = query(studentsCollection, where("class", "==", teacherClass), where("session", "==", teacherYear));
            const studentsSnap = await getDocs(q);
            studentsList = [];
            studentsSnap.forEach(doc => studentsList.push({ id: doc.id, ...doc.data() }));
            
            const meritSnap = await getDocs(meritCollection);
            allMeritRecords = [];
            meritSnap.forEach(doc => allMeritRecords.push({ id: doc.id, ...doc.data() }));
            
            const attendanceSnap = await getDocs(attendanceRef);
            allAttendanceRecords = [];
            attendanceSnap.forEach(doc => allAttendanceRecords.push({ id: doc.id, ...doc.data() }));
            
            updateStats();
            renderStudents();
        } catch(e) {
            console.error(e);
            document.getElementById('studentsContainer').innerHTML = '<div class="empty-state"><p style="color:#dc2626;">Ralat memuat data</p></div>';
        }
    }
    
    function updateStats() {
        document.getElementById('totalStudents').innerText = studentsList.length;
        const teacherClass = sessionStorage.getItem('teacherClass') || '-';
        const teacherYear = sessionStorage.getItem('teacherYear') || currentYear;
        document.getElementById('displayClass').innerText = teacherClass;
        document.getElementById('displayYear').innerText = teacherYear;
        
        let classTotalMerit = 0;
        studentsList.forEach(student => {
            const studentRecords = allMeritRecords.filter(r => r.studentId === student.id);
            const studentTotal = studentRecords.reduce((sum, r) => sum + (r.points || 0), 0);
            classTotalMerit += studentTotal;
        });
        document.getElementById('totalClassMerit').innerText = classTotalMerit;
        const avg = studentsList.length > 0 ? Math.round(classTotalMerit / studentsList.length) : 0;
        document.getElementById('averageMerit').innerText = avg;
    }
    
    function getStudentAttendanceStats(studentIC) {
        const records = allAttendanceRecords.filter(r => r.ic === studentIC);
        const hadir = records.filter(r => r.status === 'hadir').length;
        const lewat = records.filter(r => r.status === 'lewat').length;
        const tidakHadir = records.filter(r => r.status === 'tidakhadir').length;
        const cuti = records.filter(r => r.status === 'cuti').length;
        return { hadir, lewat, tidakHadir, cuti };
    }
    
    function getTodayStatus(studentIC) {
        const today = new Date();
        const day = today.getDate().toString().padStart(2, '0');
        const month = (today.getMonth() + 1).toString().padStart(2, '0');
        const year = today.getFullYear();
        const todayFormatted = `${day}/${month}/${year}`;
        return allAttendanceRecords.find(r => r.ic === studentIC && r.scanDate === todayFormatted);
    }
    
    function getStudentTotalMerit(studentId) {
        const records = allMeritRecords.filter(r => r.studentId === studentId);
        return records.reduce((sum, r) => sum + (r.points || 0), 0);
    }
    
    // ==================== PRINT QR CODE (SAMA SEPERTI DASHBOARD PELAJAR) ====================
    function printQRCode(studentName, studentIC) {
        const printContainer = document.getElementById('printContainer');
        printContainer.style.display = 'block';
        printContainer.innerHTML = '';
        
        const printCard = document.createElement('div');
        printCard.className = 'qr-print-card';
        printCard.style.cssText = `
            width: 7cm;
            height: 10cm;
            padding: 0.4cm;
            background: white;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif;
        `;
        
        printCard.innerHTML = `
            <div style="font-size: 10pt; font-weight: bold; color: #4f46e5; margin-bottom: 0.2cm; text-transform: uppercase;">E-MIND CARE SEMSIRA</div>
            <div id="printQrCode" style="margin: 0.2cm 0; display: flex; justify-content: center;"></div>
            <div style="font-size: 11pt; font-weight: bold; color: #1e293b; margin-top: 0.2cm; margin-bottom: 0.1cm;">${escapeHtml(studentName)}</div>
            <div style="font-size: 9pt; color: #64748b; margin-bottom: 0.2cm;">No. IC: ${escapeHtml(studentIC)}</div>
            <div style="font-size: 7pt; color: #94a3b8; margin-top: 0.2cm; border-top: 0.5px dashed #cbd5e1; padding-top: 0.2cm;">Kad Kehadiran Digital • Scan untuk rekod kehadiran</div>
        `;
        
        printContainer.appendChild(printCard);
        
        const qrData = JSON.stringify({ ic: studentIC, name: studentName, type: 'attendance' });
        new QRCode(document.getElementById('printQrCode'), {
            text: qrData,
            width: 120,
            height: 120,
            colorDark: "#1e293b",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
        });
        
        setTimeout(() => {
            const printWindow = window.open('', '_blank');
            const printHtml = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>QR Code Kehadiran - ${studentName}</title>
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body {
                            font-family: 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif;
                            background: white;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            min-height: 100vh;
                        }
                        .qr-print-card {
                            width: 7cm;
                            height: 10cm;
                            padding: 0.4cm;
                            background: white;
                            border: 1px solid #e2e8f0;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            text-align: center;
                            box-shadow: none;
                        }
                    </style>
                </head>
                <body>
                    ${printCard.outerHTML}
                </body>
                </html>
            `;
            
            printWindow.document.write(printHtml);
            printWindow.document.close();
            
            printWindow.onload = () => {
                printWindow.print();
            };
            
            setTimeout(() => {
                printContainer.style.display = 'none';
                printContainer.innerHTML = '';
            }, 1000);
        }, 500);
    }
    
    // ==================== SHOW ATTENDANCE MODAL ====================
    async function showAttendanceModal(studentId, studentName, studentIC) {
        const stats = getStudentAttendanceStats(studentIC);
        const todayRecord = getTodayStatus(studentIC);
        const today = new Date();
        const todayFormatted = `${today.getDate().toString().padStart(2,'0')}/${(today.getMonth()+1).toString().padStart(2,'0')}/${today.getFullYear()}`;
        const dayName = today.toLocaleDateString('ms-MY', { weekday: 'long' });
        
        let todayHtml = '';
        if (todayRecord) {
            const status = todayRecord.status;
            let icon = '', title = '', message = '', cssClass = '';
            switch(status) {
                case 'hadir': icon = '<i class="fas fa-check-circle"></i>'; title = 'TAHNIAH!'; message = 'Anda telah hadir ke sekolah hari ini.'; cssClass = 'hadir'; break;
                case 'lewat': icon = '<i class="fas fa-clock"></i>'; title = 'ANDA LEWAT'; message = 'Anda lewat pada hari ini. Cuba datang lebih awal.'; cssClass = 'lewat'; break;
                case 'tidakhadir': icon = '<i class="fas fa-times-circle"></i>'; title = 'ANDA TIDAK HADIR'; message = 'Anda tidak hadir pada hari ini.'; cssClass = 'tidakhadir'; break;
                case 'cuti': icon = '<i class="fas fa-umbrella-beach"></i>'; title = 'CUTI BERSEBAB'; message = `Semoga hari anda berjalan lancar. ${todayRecord.reason ? `Sebab: ${todayRecord.reason}` : ''}`; cssClass = 'cuti'; break;
            }
            todayHtml = `
                <div class="today-status-card ${cssClass}">
                    <div class="status-icon">${icon}</div>
                    <div class="status-title">${title}</div>
                    <div class="status-message" style="font-size:0.8rem;">${message}</div>
                    <div style="font-size:0.7rem; margin-top:0.5rem;">
                        <i class="fas fa-calendar-alt"></i> ${todayFormatted} (${dayName})<br>
                        <i class="fas fa-clock"></i> Masa: ${todayRecord.time || '-'}
                    </div>
                </div>
            `;
        } else {
            todayHtml = `
                <div class="today-status-card" style="background:#f1f5f9; text-align:center; padding:1rem; border-radius:1rem;">
                    <i class="fas fa-question-circle" style="font-size:2rem; color:#94a3b8;"></i>
                    <p style="margin-top:0.5rem;">Tiada rekod kehadiran untuk hari ini (${todayFormatted})</p>
                </div>
            `;
        }
        
        const modalHtml = `
            <div id="attendanceModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3><i class="fas fa-calendar-check"></i> Kehadiran - ${escapeHtml(studentName)}</h3>
                        <button class="modal-close" onclick="document.getElementById('attendanceModal').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div style="background:linear-gradient(135deg,#2563eb,#7c3aed); color:white; border-radius:1rem; padding:1rem; margin-bottom:1rem;">
                            <p><i class="fas fa-id-card"></i> ${escapeHtml(studentIC)}</p>
                            <p><i class="fas fa-school"></i> ${escapeHtml(studentsList.find(s=>s.id===studentId)?.class || '-')}</p>
                        </div>
                        
                        ${todayHtml}
                        
                        <h4 style="margin:1rem 0 0.5rem;"><i class="fas fa-chart-simple"></i> Ringkasan Kehadiran Keseluruhan</h4>
                        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; margin-bottom:1rem;">
                            <div style="text-align:center; padding:0.5rem; background:#dcfce7; border-radius:0.5rem;">
                                <div style="font-size:1.2rem; font-weight:800;">${stats.hadir}</div>
                                <div style="font-size:0.65rem;">Hadir</div>
                            </div>
                            <div style="text-align:center; padding:0.5rem; background:#fef3c7; border-radius:0.5rem;">
                                <div style="font-size:1.2rem; font-weight:800;">${stats.lewat}</div>
                                <div style="font-size:0.65rem;">Lewat</div>
                            </div>
                            <div style="text-align:center; padding:0.5rem; background:#fee2e2; border-radius:0.5rem;">
                                <div style="font-size:1.2rem; font-weight:800;">${stats.tidakHadir}</div>
                                <div style="font-size:0.65rem;">Tidak Hadir</div>
                            </div>
                            <div style="text-align:center; padding:0.5rem; background:#dbeafe; border-radius:0.5rem;">
                                <div style="font-size:1.2rem; font-weight:800;">${stats.cuti}</div>
                                <div style="font-size:0.65rem;">Cuti</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    
    async function executeDeleteStudent(id, name) {
        try {
            const studentMeritRecords = allMeritRecords.filter(r => r.studentId === id);
            for (const record of studentMeritRecords) {
                await deleteDoc(doc(db, "merit_records", record.id));
            }
            await deleteDoc(doc(db, "students", id));
            allMeritRecords = allMeritRecords.filter(r => r.studentId !== id);
            studentsList = studentsList.filter(s => s.id !== id);
            updateStats();
            renderStudents();
            showAlert(`✅ Pelajar "${name}" telah dipadam`, 'success');
        } catch(e) {
            showAlert('❌ Gagal memadam pelajar', 'error');
        }
    }
    
    function confirmDeleteStudent(id, name) {
        pendingDeleteId = id;
        pendingDeleteName = name;
        const modalHtml = `
            <div id="confirmDeleteModal" class="modal">
                <div class="modal-content confirm-delete">
                    <div class="modal-header">
                        <h3><i class="fas fa-trash-alt"></i> Sahkan Pemadaman</h3>
                        <button class="modal-close" onclick="document.getElementById('confirmDeleteModal').remove()">&times;</button>
                    </div>
                    <div class="modal-body" style="text-align:center;">
                        <div class="warning-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <p>Padam pelajar: <strong>${escapeHtml(name)}</strong></p>
                        <p style="color:#dc2626; font-size:0.7rem;">⚠️ Tindakan ini TIDAK BOLEH DIBATALKAN!</p>
                        <div class="confirm-buttons">
                            <button class="btn-confirm btn-confirm-no" onclick="document.getElementById('confirmDeleteModal').remove()">Batal</button>
                            <button class="btn-confirm btn-confirm-yes" onclick="proceedDelete()">Ya, Padam</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    
    window.proceedDelete = function() {
        if (pendingDeleteId) {
            executeDeleteStudent(pendingDeleteId, pendingDeleteName);
            const modal = document.getElementById('confirmDeleteModal');
            if (modal) modal.remove();
            pendingDeleteId = null;
        }
    };
    
    function renderStudents() {
        const container = document.getElementById('studentsContainer');
        let filtered = studentsList;
        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            filtered = studentsList.filter(s => s.fullname.toLowerCase().includes(term) || s.icNumber.includes(term));
        }
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><p>Tiada pelajar ditemui</p></div>`;
            return;
        }
        
        let html = `<div class="students-grid">`;
        filtered.forEach(student => {
            const totalMerit = getStudentTotalMerit(student.id);
            const attendanceStats = getStudentAttendanceStats(student.icNumber);
            
            html += `
                <div class="student-card">
                    <div class="student-card-header">
                        <h3>${escapeHtml(student.fullname)}</h3>
                        <div class="ic"><i class="fas fa-id-card"></i> ${escapeHtml(student.icNumber)}</div>
                        <div class="merit-badge">${totalMerit} merit</div>
                    </div>
                    <div class="student-card-body">
                        <div class="student-details">
                            <div class="detail-row"><span>Kelas</span><span>${escapeHtml(student.class)}</span></div>
                            <div class="detail-row"><span>Tahun</span><span>${escapeHtml(student.session)}</span></div>
                        </div>
                        <div class="attendance-stats">
                            <div class="att-stat hadir"><div class="num">${attendanceStats.hadir}</div><div class="label">Hadir</div></div>
                            <div class="att-stat lewat"><div class="num">${attendanceStats.lewat}</div><div class="label">Lewat</div></div>
                            <div class="att-stat tidakhadir"><div class="num">${attendanceStats.tidakHadir}</div><div class="label">Tidak Hadir</div></div>
                            <div class="att-stat cuti"><div class="num">${attendanceStats.cuti}</div><div class="label">Cuti</div></div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-print-qr" onclick="window.printQRCode('${escapeHtml(student.fullname)}', '${student.icNumber}')"><i class="fas fa-print"></i> Print QR</button>
                            <button class="btn-attendance" onclick="window.showAttendanceModal('${student.id}', '${escapeHtml(student.fullname)}', '${student.icNumber}')"><i class="fas fa-calendar-check"></i> Kehadiran</button>
                            <button class="btn-view" onclick="viewStudentMerit('${student.id}')"><i class="fas fa-star"></i> Merit</button>
                            <button class="btn-edit-card" onclick="openEditStudentModal('${student.id}', '${escapeHtml(student.fullname)}', '${escapeHtml(student.icNumber)}', '${escapeHtml(student.class)}', '${student.session}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-delete-card" onclick="confirmDeleteStudent('${student.id}', '${escapeHtml(student.fullname)}')"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }
    
    window.printQRCode = printQRCode;
    window.showAttendanceModal = showAttendanceModal;
    
    window.viewStudentMerit = async function(studentId) {
        const student = studentsList.find(s => s.id === studentId);
        if (!student) return;
        const total = getStudentTotalMerit(studentId);
        const studentRecords = allMeritRecords.filter(r => r.studentId === studentId);
        let meritHtml = studentRecords.length === 0 ? '<p style="text-align:center;">Tiada rekod merit</p>' : '';
        for (const record of studentRecords) {
            meritHtml += `<div style="background:#f8fafc; padding:0.5rem; margin-bottom:0.5rem; border-radius:0.5rem;"><strong>${record.points} markah</strong><br><small>${record.description}</small></div>`;
        }
        const modalHtml = `<div id="meritModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Rekod Merit - ${escapeHtml(student.fullname)}</h3><button class="modal-close" onclick="document.getElementById('meritModal').remove()">&times;</button></div><div class="modal-body"><h3>${total} Jumlah Merit</h3>${meritHtml}</div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    
    function openAddStudentModal() {
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> Tambah Pelajar Baru';
        document.getElementById('studentId').value = '';
        document.getElementById('fullname').value = '';
        document.getElementById('icNumber').value = '';
        document.getElementById('className').value = sessionStorage.getItem('teacherClass') || '';
        document.getElementById('session').value = sessionStorage.getItem('teacherYear') || '2026';
        document.getElementById('studentModal').style.display = 'flex';
    }
    
    window.openEditStudentModal = function(id, fullname, icNumber, className, session) {
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit"></i> Edit Maklumat Pelajar';
        document.getElementById('studentId').value = id;
        document.getElementById('fullname').value = fullname;
        document.getElementById('icNumber').value = icNumber;
        document.getElementById('className').value = className;
        document.getElementById('session').value = session;
        document.getElementById('studentModal').style.display = 'flex';
    };
    
    document.getElementById('addStudentBtn').addEventListener('click', openAddStudentModal);
    document.getElementById('studentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('studentId').value;
        const fullname = document.getElementById('fullname').value.trim();
        const icNumber = document.getElementById('icNumber').value.trim();
        const className = document.getElementById('className').value.trim();
        const session = document.getElementById('session').value.trim();
        
        if (!fullname || !icNumber || !className || !session) { showAlert('Sila lengkapkan maklumat', 'error'); return; }
        try {
            if (id) {
                await updateDoc(doc(db, "students", id), { fullname, icNumber, class: className, session });
                showAlert('✅ Maklumat pelajar dikemaskini!', 'success');
            } else {
                const q = query(studentsCollection, where("icNumber", "==", icNumber));
                const snapshot = await getDocs(q);
                if (!snapshot.empty) { showAlert('❌ No. IC sudah wujud!', 'error'); return; }
                await addDoc(studentsCollection, { fullname, icNumber, class: className, session, createdAt: new Date().toISOString() });
                showAlert('✅ Pelajar baru ditambah!', 'success');
            }
            closeStudentModal();
            await loadAllData();
        } catch(e) { showAlert('❌ Gagal menyimpan', 'error'); }
    });
    
    document.getElementById('transferStudentsBtn').addEventListener('click', () => document.getElementById('transferModal').style.display = 'flex');
    document.getElementById('confirmTransferBtn').addEventListener('click', async () => {
        const targetYear = document.getElementById('targetYear').value.trim();
        const targetClass = document.getElementById('targetClass').value.trim() || currentClass;
        if (!targetYear || !/^\d{4}$/.test(targetYear)) { showAlert('Tahun tidak sah', 'error'); return; }
        let copied = 0;
        for (const student of studentsList) {
            const q = query(studentsCollection, where("icNumber", "==", student.icNumber), where("class", "==", targetClass), where("session", "==", targetYear));
            const existing = await getDocs(q);
            if (existing.empty) {
                await addDoc(studentsCollection, { fullname: student.fullname, icNumber: student.icNumber, class: targetClass, session: targetYear, createdAt: new Date().toISOString() });
                copied++;
            }
        }
        showAlert(`✅ ${copied} pelajar disalin`, 'success');
        closeTransferModal();
    });
    
    window.closeTransferModal = () => document.getElementById('transferModal').style.display = 'none';
    window.closeStudentModal = () => document.getElementById('studentModal').style.display = 'none';
    document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value; renderStudents(); });
    
    loadAllData();
</script>
