    console.log("Total soalan:", allQuestions.length); // Should be 180
    
    let answers = {};
    let currentIndex = 0;
    let scores = { R: 0, I: 0, A: 0, S: 0, E: 0, K: 0 };
    let hasCompleted = false;
    let existingResultId = null;
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function saveProgress() {
        localStorage.setItem('imk_progress', JSON.stringify({
            currentIndex, answers, scores, hasCompleted
        }));
    }
    
    function loadProgress() {
        const saved = localStorage.getItem('imk_progress');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (!data.hasCompleted) {
                    currentIndex = data.currentIndex;
                    answers = data.answers;
                    scores = data.scores;
                    hasCompleted = data.hasCompleted;
                }
            } catch(e) {}
        }
    }
    
    async function checkExistingResult() {
        try {
            const q = query(ujianResultsCollection, where("studentIC", "==", studentIC));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                querySnapshot.forEach((doc) => {
                    hasCompleted = true;
                    existingResultId = doc.id;
                });
                return true;
            }
            return false;
        } catch (error) {
            console.error("Error checking existing result:", error);
            return false;
        }
    }
    
    async function saveResultToFirestore() {
        const totalScore = Object.values(scores).reduce((a,b) => a + b, 0);
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0,3).map(([cat, score]) => `${cat} (${score})`).join(", ");
        const top3Codes = sorted.slice(0,3).map(([cat]) => cat).join("");
        
        const resultData = {
            studentName: studentName,
            studentIC: studentIC,
            studentClass: studentClass,
            studentSession: studentSession,
            date: currentDate,
            time: currentTime,
            day: currentDay,
            scores: scores,
            totalScore: totalScore,
            topCategories: top3,
            hollandCode: top3Codes,
            completedAt: new Date().toISOString(),
            status: "completed"
        };
        
        try {
            if (existingResultId) {
                await updateDoc(doc(db, "ujian_minat_kerjaya", existingResultId), resultData);
            } else {
                await setDoc(doc(db, "ujian_minat_kerjaya", `${studentIC}_${Date.now()}`), resultData);
            }
            showToast("✅ Jawapan anda telah disimpan!");
            return true;
        } catch (error) {
            console.error("Error saving result:", error);
            showToast("❌ Gagal menyimpan jawapan");
            return false;
        }
    }
    
    function renderProfile() {
        return `
            <div class="profile-card">
                <div class="profile-grid">
                    <div class="profile-item"><div class="label">Nama Penuh</div><div class="value">${studentName}</div></div>
                    <div class="profile-item"><div class="label">No. Kad Pengenalan</div><div class="value">${studentIC}</div></div>
                    <div class="profile-item"><div class="label">Kelas</div><div class="value">${studentClass}</div></div>
                    <div class="profile-item"><div class="label">Tarikh / Masa</div><div class="value">${currentDate} • ${currentTime}</div></div>
                    <div class="profile-item"><div class="label">Hari</div><div class="value">${currentDay}</div></div>
                </div>
            </div>
        `;
    }
    
    function renderProgress() {
        const percent = (currentIndex / allQuestions.length) * 100;
        return `
            <div class="progress-container">
                <div class="progress-bar" style="width: ${percent}%;"></div>
            </div>
            <div class="progress-text">Soalan ${currentIndex + 1} / ${allQuestions.length}</div>
        `;
    }
    
    function renderQuestion() {
        if (currentIndex >= allQuestions.length) {
            renderResult();
            return;
        }
        
        const q = allQuestions[currentIndex];
        const selected = answers[currentIndex];
        
        const html = `
            ${renderProfile()}
            ${renderProgress()}
            <div class="question-card">
                <div class="question-header">
                    <span class="question-num">Soalan ${currentIndex + 1}</span>
                    <span class="question-cat">Kategori: ${q.cat}</span>
                </div>
                <div class="question-prefix">${q.prefix}</div>
                <div class="question-text">${q.text}</div>
                <div class="options">
                    <button class="option-btn option-yes ${selected === true ? 'option-selected-yes' : ''}" onclick="answerQuestion(true)">
                        <i class="fas fa-check-circle"></i> YA
                    </button>
                    <button class="option-btn option-no ${selected === false ? 'option-selected-no' : ''}" onclick="answerQuestion(false)">
                        <i class="fas fa-times-circle"></i> TIDAK
                    </button>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>
                    <i class="fas fa-arrow-left"></i> Sebelum
                </button>
                <button class="nav-btn nav-btn-primary" onclick="nextQuestion()">
                    ${currentIndex === allQuestions.length - 1 ? 'Selesai' : 'Seterusnya'} <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }
    
    window.answerQuestion = function(answer) {
        const q = allQuestions[currentIndex];
        const previousAnswer = answers[currentIndex];
        
        if (previousAnswer !== undefined) {
            if (previousAnswer === true) scores[q.cat]--;
        }
        
        answers[currentIndex] = answer;
        if (answer === true) {
            scores[q.cat]++;
        }
        
        saveProgress();
        
        const yesBtn = document.querySelector('.option-yes');
        const noBtn = document.querySelector('.option-no');
        if (yesBtn && noBtn) {
            if (answer === true) {
                yesBtn.classList.add('option-selected-yes');
                noBtn.classList.remove('option-selected-no');
            } else {
                noBtn.classList.add('option-selected-no');
                yesBtn.classList.remove('option-selected-yes');
            }
        }
    };
    
    window.nextQuestion = function() {
        if (answers[currentIndex] === undefined) {
            showToast("Sila jawab soalan ini terlebih dahulu");
            return;
        }
        
        if (currentIndex < allQuestions.length - 1) {
            currentIndex++;
            saveProgress();
            renderQuestion();
        } else {
            submitUjian();
        }
    };
    
    window.prevQuestion = function() {
        if (currentIndex > 0) {
            currentIndex--;
            saveProgress();
            renderQuestion();
        }
    };
    
    async function submitUjian() {
        const totalAnswered = Object.keys(answers).length;
        if (totalAnswered < allQuestions.length) {
            showToast(`Sila jawab semua soalan (${allQuestions.length - totalAnswered} soalan lagi)`);
            return;
        }
        
        await saveResultToFirestore();
        hasCompleted = true;
        localStorage.removeItem('imk_progress');
        renderResult();
    }
    
    function renderResult() {
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0,3);
        const hollandCode = top3.map(([cat]) => cat).join("");
        
        const categoryNames = {
            R: "REALISTIK (R) - Praktikal / Kerja Fizikal",
            I: "INVESTIGATIF (I) - Sains / Penyelidikan",
            A: "ARTISTIK (A) - Kreatif / Ekspresi Diri",
            S: "SOSIAL (S) - Membantu / Berkomunikasi",
            E: "ENTERPRISING (E) - Memimpin / Berniaga",
            K: "KONVENSIONAL (K) - Teratur / Sistematik"
        };
        
        const categoryColors = {
            R: "#00d2ff", I: "#3a7bd5", A: "#6c5ce7", S: "#00b894", E: "#fdcb6e", K: "#e17055"
        };
        
        let barsHtml = '';
        for (let [cat, score] of sorted) {
            const percent = (score / 30) * 100;
            barsHtml += `
                <div class="result-bar">
                    <div class="result-bar-label">
                        <span><strong>${cat}</strong> - ${categoryNames[cat].split(' - ')[0]}</span>
                        <span>${score} / 30</span>
                    </div>
                    <div class="result-bar-fill">
                        <span style="width: ${percent}%; background: ${categoryColors[cat]};"></span>
                    </div>
                </div>
            `;
        }
        
        const topBadgesHtml = top3.map(([cat, score]) => 
            `<span class="top-badge" style="background: ${categoryColors[cat]};">${cat} - ${categoryNames[cat].split(' - ')[0]} (${score})</span>`
        ).join('');
        
        const html = `
            ${renderProfile()}
            <div class="result-card">
                <div class="result-title">
                    <i class="fas fa-chart-pie"></i> KEPUTUSAN INVENTORI MINAT KERJAYA
                </div>
                
                <div class="top-categories">
                    <h4>🏆 3 KATEGORI TERTINGGI ANDA 🏆</h4>
                    <div>${topBadgesHtml}</div>
                    <p style="margin-top: 0.8rem; font-size: 0.9rem;"><strong>Kod Holland Anda: ${hollandCode}</strong></p>
                </div>
                
                <div class="result-chart">
                    ${barsHtml}
                </div>
                
                <div style="background: #f1f5f9; border-radius: 1rem; padding: 1rem; margin-top: 1rem;">
                    <p style="font-size: 0.8rem; color: #64748b; text-align: center;">
                        <i class="fas fa-info-circle"></i> Kod Holland adalah gabungan tiga kategori tertinggi.<br>
                        Contoh: Jika R, I, A tertinggi → Kod Holland anda adalah <strong>RIA</strong>
                    </p>
                    <p style="font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 0.5rem;">
                        Tarikh: ${currentDate} | Masa: ${currentTime} | Hari: ${currentDay}
                    </p>
                </div>
                
                <button class="btn-submit" onclick="window.location.href='psikometrik.html'">
                    <i class="fas fa-check-circle"></i> Selesai & Kembali
                </button>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }
    
    function renderLocked() {
        const html = `
            ${renderProfile()}
            <div class="locked-message">
                <i class="fas fa-lock" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h3>Ujian Telah Selesai</h3>
                <p>Anda telah pun menjawab Inventori Minat Kerjaya ini.</p>
                <p>Sila rujuk kaunselor untuk reset ujian jika perlu.</p>
                <button class="btn-submit" style="background: #64748b; margin-top: 1rem;" onclick="window.location.href='psikometrik.html'">
                    <i class="fas fa-arrow-left"></i> Kembali ke Senarai Ujian
                </button>
            </div>
        `;
        document.getElementById('contentArea').innerHTML = html;
    }
    
    async function init() {
        const exists = await checkExistingResult();
        if (exists) {
            renderLocked();
        } else {
            loadProgress();
            if (hasCompleted) {
                renderResult();
            } else {
                renderQuestion();
            }
        }
    }
    
    window.answerQuestion = answerQuestion;
    window.nextQuestion = nextQuestion;
    window.prevQuestion = prevQuestion;
    
    init();
</script>
