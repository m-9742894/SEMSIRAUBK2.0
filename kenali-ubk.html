<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenali UBK | SEMSIRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Tema Angkasa Moden */
            background: radial-gradient(circle at center, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            perspective: 1500px;
        }

        /* Latar Belakang Bintang */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Container Utama 3D */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            transform-style: preserve-3d;
            animation: containerFloat 6s infinite ease-in-out;
        }

        @keyframes containerFloat {
            0%, 100% { transform: translateY(0) rotateY(-5deg); }
            50% { transform: translateY(-20px) rotateY(5deg); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00d2ff;
        }

        p.subtitle {
            color: #81d4fa;
            margin-bottom: 50px;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Susunan Button 3D */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .btn-3d {
            position: relative;
            width: 300px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 210, 255, 0.5);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
            box-shadow: 0 10px 0 #008ca8, 0 20px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-3d:hover {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #008ca8, 0 10px 20px rgba(0, 210, 255, 0.4);
            background: rgba(0, 210, 255, 0.1);
        }

        .btn-3d:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #008ca8;
        }

        .icon-box {
            position: absolute;
            left: 20px;
            font-size: 1.5rem;
        }

        /* Navigasi (Previous & Next) */
        .nav-links {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .nav-btn {
            color: #ffa726;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .nav-btn:hover {
            border-bottom: 2px solid #ffa726;
            letter-spacing: 1px;
            color: #ffcc80;
        }

        /* Hiasan Terapung */
        .floating-object {
            position: absolute;
            font-size: 40px;
            filter: drop-shadow(0 0 15px #00d2ff);
            z-index: 1;
            animation: objectSway 10s infinite alternate ease-in-out;
        }

        @keyframes objectSway {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(30px, 50px) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>

    <div class="floating-object" style="top: 15%; left: 10%;">💎</div>
    <div class="floating-object" style="bottom: 20%; right: 10%; animation-delay: 2s;">🔮</div>

    <div class="main-container">
        <h1>KENALI KAMI</h1>
        <p class="subtitle">UBK SMK SYED SIRAJUDDIN</p>

        <div class="button-group">
            <a href="kenali-ubk/latar-belakang.html" class="btn-3d">
                <span class="icon-box">📜</span>
                Latar Belakang
            </a>

            <a href="kenali-ubk/profil-gbk.html" class="btn-3d" style="border-color: #ff4081; box-shadow: 0 10px 0 #c2185b, 0 20px 30px rgba(0,0,0,0.5);">
                <span class="icon-box">👩‍🏫</span>
                Profil GBK
            </a>
            
            <a href="kenali-ubk/visi-misi.html" class="btn-3d" style="border-color: #4caf50; box-shadow: 0 10px 0 #2e7d32, 0 20px 30px rgba(0,0,0,0.5);">
                <span class="icon-box">🎯</span>
                Visi & Misi
            </a>
        </div>

        <div class="nav-links">
            <a href="portal-utama.html" class="nav-btn">← MENU UTAMA</a>
            <a href="mood-checkin.html" class="nav-btn">MOOD CHECK-IN →</a>
        </div>
    </div>

    <script>
        // Script untuk janji bintang berkelip
        const starField = document.getElementById('starField');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.background = 'white';
            star.style.borderRadius = '50%';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.opacity = Math.random();
            star.style.animation = `blink ${Math.random() * 3 + 2}s infinite`;
            starField.appendChild(star);
        }

        const style = document.createElement('style');
        style.innerHTML = `@keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
