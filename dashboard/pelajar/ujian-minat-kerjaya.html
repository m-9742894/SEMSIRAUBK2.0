        "mencantas tanaman hiasan", "membaiki peralatan yang rosak", "menggunakan peralatan dalam bengkel", "menggunakan komputer untuk mencari maklumat", "menonton acara sukan",

        "menggunakan mesin", "menggunakan perisian komputer", "menjaga haiwan peliharaan", "membuat keputusan mengikut situasi", "menggunakan peralatan sukan"

        "bertindak mengikut gerak hati", "mengikuti siri animasi", "menghasilkan karya digital", "membuat rakaman kreatif", "menghayati pemandangan yang indah",
        "penggubah lagu", "penyanyi", "pelakon", "juruhias", "jurusolek",

        "berimaginasi tinggi", "meluahkan perasaan melalui aktiviti seni", "menghayati pelbagai emosi", "menghasilkan nota dengan pelbagai cara", "bertindak mengikut kemahuan diri"
    ];
    
    const sSoalan = [
        "menyertai aktiviti perkhemahan", "bergotong-royong membersihkan kawasan sekolah", "menolong rakan yang ditimpa kesusahan", "berada dalam kumpulan", "beramah mesra",
        "mengambil berat terhadap orang sekeliling", "belajar pelbagai bahasa", "meraikan rakan-rakan", "berkongsi idea dengan orang lain", "melibatkan diri dengan aktiviti khidmat sosial",
        "guru", "pendakwah", "jururawat", "penyambut tetamu", "pakar motivasi",
        "pegawai tadbir diplomatik", "pegawai kebajikan masyarakat", "pensyarah", "wartawan", "pelayan kapal terbang",
        "berinteraksi dengan ramai orang", "bekerjasama dengan orang lain", "menyertai acara sukan", "mendapatkan sumbangan", "memujuk orang yang dalam kesedihan",
        "beramah mesra dengan orang yang baru dikenali", "memberi bantuan kepada orang yang memerlukan", "didekati oleh ramai orang", "menolong orang yang dalam kesusahan", "menjadi sukarelawan"

    const eSoalan = [

        "aktiviti yang mencabar", "dikenali ramai", "menarik perhatian orang lain", "mengetuai persembahan", "berniaga",

        "menyelia kerja-kerja orang lain", "mempengaruhi orang lain", "menjadi jurujual", "mewakili kumpulan dalam pembentangan", "berniaga kecil-kecilan",
        "menjadi pemimpin", "meyakinkan orang lain menerima idea saya", "mengendalikan majlis", "mempengaruhi rakan-rakan menyertai sesuatu aktiviti", "merancang matlamat dengan jelas"
    ];
    
    const kSoalan = [
        "merekod setiap perbelanjaan", "menyusun sijil dalam fail", "membuat senarai barang yang hendak dibeli", "menyusun barang-barang peribadi", "mengutamakan kekemasan",
        "melaksanakan tugasan secara terperinci", "bertugas mengikut jadual", "menyiapkan tugasan tepat pada masanya", "membuat kerja secara sistematik", "mematuhi peraturan",
        "pegawai bank", "akauntan", "juruwang", "setiausaha", "juruaudit",
        "pengaturcara komputer", "pustakawan", "pengurup wang", "penilai harta", "kerani",
        "menguruskan dokumen dengan sistematik", "menggunakan perisian komputer", "menyelesaikan tugasan secara terperinci", "menyusun aktiviti harian", "menyimpan dokumen dengan rapi",
        "bekerja secara sistematik", "melakukan tugasan mengikut arahan", "menepati masa", "mengurus perbelanjaan harian", "merekod wang simpanan"
    ];
    
    // Build complete questions array: R,I,A,S,E,K repeated (30 cycles = 180 soalan)
    let allQuestions = [];
    for (let i = 0; i < 30; i++) {
        allQuestions.push({ q: rSoalan[i], cat: "R" });
        allQuestions.push({ q: iSoalan[i], cat: "I" });
        allQuestions.push({ q: aSoalan[i], cat: "A" });
        allQuestions.push({ q: sSoalan[i], cat: "S" });
        allQuestions.push({ q: eSoalan[i], cat: "E" });
        allQuestions.push({ q: kSoalan[i], cat: "K" });
    }
    // 30 cycles * 6 = 180 soalan
    
    // Function to get prefix based on question index (0-based)
    // Soalan 1-10 (index 0-9) -> "SAYA SUKA"
    // Soalan 11-20 (index 10-19) -> "SAYA BERMINAT MENJADI"
    // Soalan 21-30 (index 20-29) -> "SAYA BOLEH"
    // Pattern repeats every 30 questions
    function getQuestionPrefix(index) {
        const positionInCycle = index % 30;
        if (positionInCycle < 10) return "SAYA SUKA...";
        if (positionInCycle < 20) return "SAYA BERMINAT MENJADI...";
        return "SAYA BOLEH...";
    }
    
    let answers = {};
    let currentIndex = 0;
    let scores = { R: 0, I: 0, A: 0, S: 0, E: 0, K: 0 };
    let hasCompleted = false;
    let existingResultId = null;
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function saveProgress() {
        localStorage.setItem('imk_progress', JSON.stringify({
            currentIndex, answers, scores, hasCompleted
        }));
    }
    
    function loadProgress() {
        const saved = localStorage.getItem('imk_progress');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (!data.hasCompleted) {
                    currentIndex = data.currentIndex;
                    answers = data.answers;
                    scores = data.scores;
                    hasCompleted = data.hasCompleted;
                }
            } catch(e) {}
        }
    }
    
    async function checkExistingResult() {
        try {
            const q = query(ujianResultsCollection, where("studentIC", "==", studentIC));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                querySnapshot.forEach((doc) => {
                    hasCompleted = true;
                    existingResultId = doc.id;
                });
                return true;
            }
            return false;
        } catch (error) {
            console.error("Error checking existing result:", error);
            return false;
        }
    }
    
    async function saveResultToFirestore() {
        const totalScore = Object.values(scores).reduce((a,b) => a + b, 0);
        
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0,3).map(([cat, score]) => `${cat} (${score})`).join(", ");
        
        const resultData = {
            studentName: studentName,
            studentIC: studentIC,
            studentClass: studentClass,
            studentSession: studentSession,
            date: currentDate,
            time: currentTime,
            day: currentDay,
            scores: scores,
            totalScore: totalScore,
            topCategories: top3,
            completedAt: new Date().toISOString(),
            status: "completed"
        };
        
        try {
            if (existingResultId) {
                await updateDoc(doc(db, "ujian_minat_kerjaya", existingResultId), resultData);
            } else {
                await setDoc(doc(db, "ujian_minat_kerjaya", `${studentIC}_${Date.now()}`), resultData);
            }
            showToast("✅ Jawapan anda telah disimpan!");
            return true;
        } catch (error) {
            console.error("Error saving result:", error);
            showToast("❌ Gagal menyimpan jawapan");
            return false;
        }
    }

            </div>
        `;
    }
    
    function renderQuestion() {
        if (currentIndex >= allQuestions.length) {
            renderResult();
            return;
        }
        
        const q = allQuestions[currentIndex];
        const prefix = getQuestionPrefix(currentIndex);
        const selected = answers[currentIndex];

                </div>
                <div class="options">
                    <button class="option-btn option-yes ${selected === true ? 'option-selected-yes' : ''}" onclick="answerQuestion(true)">
                        <i class="fas fa-check-circle"></i> YA
                    </button>
                    <button class="option-btn option-no ${selected === false ? 'option-selected-no' : ''}" onclick="answerQuestion(false)">
                        <i class="fas fa-times-circle"></i> TIDAK
                    </button>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>
                    <i class="fas fa-arrow-left"></i> Sebelum
                </button>
                <button class="nav-btn nav-btn-primary" onclick="nextQuestion()">
                    ${currentIndex === allQuestions.length - 1 ? 'Selesai' : 'Seterusnya'} <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }
    
    window.answerQuestion = function(answer) {
        const q = allQuestions[currentIndex];
        const previousAnswer = answers[currentIndex];
        
        if (previousAnswer !== undefined) {
            if (previousAnswer === true) scores[q.cat]--;
        }
        
        answers[currentIndex] = answer;
        if (answer === true) {
            scores[q.cat]++;
        }
        
        saveProgress();
        
        const yesBtn = document.querySelector('.option-yes');
        const noBtn = document.querySelector('.option-no');
        if (yesBtn && noBtn) {
            if (answer === true) {
                yesBtn.classList.add('option-selected-yes');
                noBtn.classList.remove('option-selected-no');
            } else {
                noBtn.classList.add('option-selected-no');
                yesBtn.classList.remove('option-selected-yes');
            }
        }
    };
    
    window.nextQuestion = function() {
        if (answers[currentIndex] === undefined) {
            showToast("Sila jawab soalan ini terlebih dahulu");
            return;
        }
        
        if (currentIndex < allQuestions.length - 1) {
            currentIndex++;
            saveProgress();
            renderQuestion();
        } else {
            submitUjian();
        }
    };
    
    window.prevQuestion = function() {
        if (currentIndex > 0) {
            currentIndex--;
            saveProgress();
            renderQuestion();
        }
    };
    
    async function submitUjian() {
        const totalAnswered = Object.keys(answers).length;
        if (totalAnswered < allQuestions.length) {
            showToast(`Sila jawab semua soalan (${allQuestions.length - totalAnswered} soalan lagi)`);
            return;
        }
        
        await saveResultToFirestore();
        hasCompleted = true;
        localStorage.removeItem('imk_progress');
        renderResult();
    }
    
    function renderResult() {
        const total = Object.values(scores).reduce((a,b) => a + b, 0);
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0,3);
        
        const categoryNames = {
            R: "REALISTIK (R) - Praktikal / Kerja Fizikal",
            I: "INVESTIGATIF (I) - Sains / Penyelidikan",
            A: "ARTISTIK (A) - Kreatif / Ekspresi Diri",
            S: "SOSIAL (S) - Membantu / Berkomunikasi",
            E: "ENTERPRISING (E) - Memimpin / Berniaga",
            K: "KONVENSIONAL (K) - Teratur / Sistematik"
        };
        
        const categoryColors = {
            R: "#00d2ff", I: "#3a7bd5", A: "#6c5ce7", S: "#00b894", E: "#fdcb6e", K: "#e17055"
        };
        
        let barsHtml = '';
        for (let [cat, score] of sorted) {
            const percent = (score / 30) * 100;
            barsHtml += `
                <div class="result-bar">
                    <div class="result-bar-label">
                        <span><strong>${cat}</strong> - ${categoryNames[cat].split(' - ')[0]}</span>
                        <span>${score} / 30</span>
                    </div>
                    <div class="result-bar-fill">
                        <span style="width: ${percent}%; background: ${categoryColors[cat]};"></span>
                    </div>
                </div>
            `;
        }
        
        const topBadgesHtml = top3.map(([cat, score]) => 
            `<span class="top-badge" style="background: ${categoryColors[cat]};">${cat} - ${categoryNames[cat].split(' - ')[0]} (${score})</span>`
        ).join('');
        
        const html = `
            ${renderProfile()}
            <div class="result-card">
                <div class="result-title">
                    <i class="fas fa-chart-pie"></i> KEPUTUSAN INVENTORI MINAT KERJAYA
                </div>
                
                <div class="top-categories">
                    <h4>🏆 3 KATEGORI TERTINGGI ANDA 🏆</h4>
                    <div>${topBadgesHtml}</div>
                </div>
                
                <div class="result-chart">
                    ${barsHtml}
                </div>
                
                <div style="background: #f1f5f9; border-radius: 1rem; padding: 1rem; margin-top: 1rem;">
                    <p style="font-size: 0.8rem; color: #64748b; text-align: center;">
                        <i class="fas fa-info-circle"></i> Kod Holland anda adalah gabungan tiga kategori tertinggi.<br>
                        Contoh: Jika R, I, A tertinggi → Kod Holland anda adalah <strong>RIA</strong>
                    </p>
                    <p style="font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 0.5rem;">
                        Tarikh: ${currentDate} | Masa: ${currentTime} | Hari: ${currentDay}
                    </p>
                </div>
                
                <button class="btn-submit" onclick="window.location.href='psikometrik.html'">
                    <i class="fas fa-check-circle"></i> Selesai & Kembali
                </button>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }
    
    function renderLocked() {
        const html = `
            ${renderProfile()}
            <div class="locked-message">
                <i class="fas fa-lock" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h3>Ujian Telah Selesai</h3>
                <p>Anda telah pun menjawab Inventori Minat Kerjaya ini.</p>
                <p>Sila rujuk kaunselor untuk reset ujian jika perlu.</p>
                <button class="btn-submit" style="background: #64748b; margin-top: 1rem;" onclick="window.location.href='psikometrik.html'">
                    <i class="fas fa-arrow-left"></i> Kembali ke Senarai Ujian
                </button>
            </div>
        `;
        document.getElementById('contentArea').innerHTML = html;
    }
    
    async function init() {
        const exists = await checkExistingResult();
        if (exists) {
            renderLocked();
        } else {
            loadProgress();
            if (hasCompleted) {
                renderResult();
            } else {
                renderQuestion();
            }
        }
    }
    
    window.answerQuestion = answerQuestion;
    window.nextQuestion = nextQuestion;
    window.prevQuestion = prevQuestion;
    
    init();
</script>
</body>
</html>
