                    currentIndex = data.currentIndex;
                    answers = data.answers;
                    scores = data.scores;
                    hasCompleted = data.hasCompleted;
                }
            } catch(e) {}
        }
    }
    
    async function checkExistingResult() {
        try {
            const q = query(ujianResultsCollection, where("studentIC", "==", studentIC));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                querySnapshot.forEach((doc) => {
                    hasCompleted = true;
                    existingResultId = doc.id;
                });
                return true;
            }
            return false;
        } catch (error) {
            console.error("Error checking existing result:", error);
            return false;
        }
    }
    
    async function saveResultToFirestore() {
        let dominantStyle = "V";
        let highestScore = 0;
        for (const [style, score] of Object.entries(scores)) {
            if (score > highestScore) {
                highestScore = score;
                dominantStyle = style;
            }
        }
        
        const resultData = {
            studentName: studentName,
            studentIC: studentIC,
            studentClass: studentClass,
            studentSession: studentSession,
            date: currentDate,
            time: currentTime,
            day: currentDay,
            scores: scores,
            dominantStyle: dominantStyle,
            dominantScore: highestScore,
            totalQuestions: soalanList.length,
            completedAt: new Date().toISOString(),
            status: "completed"
        };
        
        try {
            if (existingResultId) {
                await updateDoc(doc(db, "ujian_gaya_belajar", existingResultId), resultData);
            } else {
                await setDoc(doc(db, "ujian_gaya_belajar", `${studentIC}_${Date.now()}`), resultData);
            }
            showToast("✅ Jawapan anda telah disimpan!");
            return true;
        } catch (error) {
            console.error("Error saving result:", error);
            showToast("❌ Gagal menyimpan jawapan");
            return false;
        }
    }
    
    function renderProfile() {
        return `
            <div class="profile-card">
                <div class="profile-grid">
                    <div class="profile-item"><div class="label">Nama Penuh</div><div class="value">${studentName}</div></div>
                    <div class="profile-item"><div class="label">No. Kad Pengenalan</div><div class="value">${studentIC}</div></div>
                    <div class="profile-item"><div class="label">Kelas</div><div class="value">${studentClass}</div></div>
                    <div class="profile-item"><div class="label">Tarikh / Masa</div><div class="value">${currentDate} • ${currentTime}</div></div>
                    <div class="profile-item"><div class="label">Hari</div><div class="value">${currentDay}</div></div>
                </div>
            </div>
        `;
    }
    
    function renderProgress() {
        const percent = (currentIndex / soalanList.length) * 100;
        return `
            <div class="progress-container">
                <div class="progress-bar" style="width: ${percent}%;"></div>
            </div>
            <div class="progress-text">Soalan ${currentIndex + 1} / ${soalanList.length}</div>
        `;
    }
    
    function renderQuestion() {
        if (currentIndex >= soalanList.length) {
            renderResult();
            return;
        }
        
        const q = soalanList[currentIndex];
        const selected = answers[currentIndex];
        
        let optionsHtml = '';
        for (const opt of q.options) {
            const isSelected = selected === opt.letter;
            optionsHtml += `
                <div class="option-btn ${isSelected ? 'option-selected' : ''}" onclick="answerQuestion('${opt.letter}')">
                    <span class="option-letter">${opt.letter}</span>
                    <span class="option-text">${opt.text}</span>
                </div>
            `;
        }
        
        const html = `
            ${renderProfile()}
            ${renderProgress()}
            <div class="question-card">
                <div class="question-header">
                    <span class="question-num">Soalan ${currentIndex + 1}</span>
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options">
                    ${optionsHtml}
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>
                    <i class="fas fa-arrow-left"></i> Sebelum
                </button>
                <button class="nav-btn nav-btn-primary" onclick="nextQuestion()">
                    ${currentIndex === soalanList.length - 1 ? 'Selesai' : 'Seterusnya'} <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }
    
    window.answerQuestion = function(answer) {
        answers[currentIndex] = answer;
        scores[answer]++;
        saveProgress();
        renderQuestion();
    };
    
    window.nextQuestion = function() {
        if (answers[currentIndex] === undefined) {
            showToast("Sila pilih jawapan terlebih dahulu");
            return;
        }
        
        if (currentIndex < soalanList.length - 1) {
            currentIndex++;
            saveProgress();
            renderQuestion();
        } else {
            submitUjian();
        }
    };
    
    window.prevQuestion = function() {
        if (currentIndex > 0) {
            currentIndex--;
            saveProgress();
            renderQuestion();
        }
    };
    
    async function submitUjian() {
        const totalAnswered = Object.keys(answers).length;
        if (totalAnswered < soalanList.length) {
            showToast(`Sila jawab semua soalan (${soalanList.length - totalAnswered} soalan lagi)`);
            return;
        }
        
        await saveResultToFirestore();
        hasCompleted = true;
        localStorage.removeItem('gaya_belajar_progress');
        renderResult();
    }
    
    function getDominantStyle() {
        let dominant = "V";
        let highest = 0;
        for (const [style, score] of Object.entries(scores)) {
            if (score > highest) {
                highest = score;
                dominant = style;
            }
        }
        return { dominant, score: highest, total: soalanList.length };
    }
    
    function renderResult() {
        const { dominant, score, total } = getDominantStyle();
        const percent = (score / total) * 100;
        
        const badgeClass = {
            V: "badge-visual", A: "badge-auditori", R: "badge-bacaan", K: "badge-kinestetik"
        };
        
        const sortedStyles = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        
        let barsHtml = '';
        for (let [style, sc] of sortedStyles) {
            const perc = (sc / total) * 100;
            barsHtml += `
                <div class="result-bar">
                    <div class="result-bar-label">
                        <span><strong>${gayaNames[style]}</strong></span>
                        <span>${sc} / ${total}</span>
                    </div>
                    <div class="result-bar-fill">
                        <span style="width: ${perc}%; background: ${gayaColors[style]};"></span>
                    </div>
                </div>
            `;
        }
        
        const html = `
            ${renderProfile()}
            <div class="result-card">
                <div class="result-title">
                    <i class="fas fa-graduation-cap"></i> KEPUTUSAN INVENTORI GAYA BELAJAR
                </div>
                
                <div class="dominant-style">
                    <div class="dominant-badge ${badgeClass[dominant]}">
                        📚 GAYA BELAJAR DOMINAN: ${gayaNames[dominant]}
                    </div>
                    <div class="style-desc">
                        ${gayaDescriptions[dominant]}
                    </div>
                    <p style="margin-top: 1rem; font-size: 0.8rem; color: #64748b;">
                        Skor anda: ${score}/${total} (${Math.round(percent)}%)
                    </p>
                </div>
                
                <div class="result-chart">
                    <h4 style="margin-bottom: 1rem;">📊 Perincian Skor Setiap Gaya Belajar</h4>
                    ${barsHtml}
                </div>
                
                <div style="background: #f1f5f9; border-radius: 1rem; padding: 1rem; margin-top: 1rem;">
                    <p style="font-size: 0.8rem; color: #64748b; text-align: center;">
                        <i class="fas fa-info-circle"></i> Kenali gaya belajar dominan anda untuk meningkatkan keberkesanan pembelajaran.
                    </p>
                    <p style="font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 0.5rem;">
                        Tarikh: ${currentDate} | Masa: ${currentTime} | Hari: ${currentDay}
                    </p>
                </div>
                
                <button class="btn-submit" onclick="window.location.href='psikometrik.html'">
                    <i class="fas fa-check-circle"></i> Selesai & Kembali
                </button>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }
    
    function renderLocked() {
        const html = `
            ${renderProfile()}
            <div class="locked-message">
                <i class="fas fa-lock" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h3>Ujian Telah Selesai</h3>
                <p>Anda telah pun menjawab Inventori Gaya Belajar ini.</p>
                <p>Sila rujuk kaunselor untuk reset ujian jika perlu.</p>
                <button class="btn-submit" style="background: #64748b; margin-top: 1rem;" onclick="window.location.href='psikometrik.html'">
                    <i class="fas fa-arrow-left"></i> Kembali ke Senarai Ujian
                </button>
            </div>
        `;
        document.getElementById('contentArea').innerHTML = html;
    }
    
    async function init() {
        const exists = await checkExistingResult();
        if (exists) {
            renderLocked();
        } else {
            loadProgress();
            if (hasCompleted) {
                renderResult();
            } else {
                renderQuestion();
            }
        }
    }
    
    window.answerQuestion = answerQuestion;
    window.nextQuestion = nextQuestion;
    window.prevQuestion = prevQuestion;
    
    init();
</script>
</body>
</html>
