<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login Pelajar | E-MindCare SEMSIRA</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* animated background */
    .bg-orb {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: floatAnim 20s infinite alternate;
    }
    .orb1 {
      width: 500px;
      height: 500px;
      background: #a78bfa;
      top: -150px;
      left: -150px;
    }
    .orb2 {
      width: 600px;
      height: 600px;
      background: #fbcfe8;
      bottom: -200px;
      right: -150px;
      animation-duration: 25s;
    }
    @keyframes floatAnim {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* login card */
    .login-container {
      max-width: 520px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2.2rem 2rem 2.5rem;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: transform 0.3s ease;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-icon {
      background: linear-gradient(145deg, #4f46e5, #7c3aed);
      width: 70px;
      height: 70px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 12px 20px -8px rgba(79, 70, 229, 0.4);
    }
    .login-icon i {
      font-size: 2.4rem;
      color: white;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1e293b, #4c1d95);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub {
      color: #5b6e8c;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    /* form styling */
    .input-group {
      margin-bottom: 1.5rem;
    }
    .input-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f2a44;
      margin-bottom: 0.5rem;
    }
    .input-group label i {
      margin-right: 6px;
      color: #4f46e5;
    }
    .input-field {
      width: 100%;
      padding: 0.9rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.2rem;
      background: white;
      transition: all 0.2s;
      outline: none;
    }
    .input-field:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }

    /* button */
    .login-btn {
      width: 100%;
      background: linear-gradient(95deg, #4f46e5, #7c3aed);
      border: none;
      padding: 0.9rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.8rem;
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.3);
    }
    .login-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(95deg, #4338ca, #6d28d9);
      box-shadow: 0 12px 22px rgba(79, 70, 229, 0.4);
    }

    /* back link */
    .back-link {
      text-align: center;
      margin-top: 1.8rem;
    }
    .back-link a {
      text-decoration: none;
      color: #4f46e5;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }
    .back-link a:hover {
      gap: 10px;
      color: #7c3aed;
    }

    .info-note {
      background: #f1f5f9;
      border-radius: 1rem;
      padding: 0.7rem;
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: #4b5563;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 1.6rem;
      }
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="bg-orb">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="login-container" data-aos="fade-up">
  <div class="login-header">
    <div class="login-icon">
      <i class="fas fa-graduation-cap"></i>
    </div>
    <h1>LOGIN PELAJAR</h1>
    <div class="sub">E-MindCare SEMSIRA • SMK Syed Sirajuddin</div>
  </div>

  <form id="loginForm" action="#" method="POST">
    <div class="input-group">
      <label><i class="fas fa-user-circle"></i> Nama Penuh</label>
      <input type="text" class="input-field" id="fullname" placeholder="cth: Ahmad bin Abdullah" required autocomplete="off">
    </div>
    <div class="input-group">
      <label><i class="fas fa-id-card"></i> Nombor Kad Pengenalan</label>
      <input type="text" class="input-field" id="icNumber" placeholder="cth: 050101-01-1234" required autocomplete="off">
    </div>
    
    <button type="submit" class="login-btn" id="submitBtn">
      <span>Masuk ke Dashboard</span> <i class="fas fa-arrow-right"></i>
    </button>
  </form>

  <div class="back-link">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Laman Utama</a>
  </div>
  <div class="info-note">
    <i class="fas fa-shield-alt"></i> Data anda dilindungi. Sesi ini hanya untuk pelajar SMK Syed Sirajuddin.
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({ once: true, duration: 600 });

  // Fungsi redirect ke dashboard pelajar (page kosong buat sementara waktu)
  function redirectToDashboard(fullname, icNumber) {
    // Simpan nama sementara jika perlu (boleh guna localStorage atau sessionStorage)
    // Nanti dashboard boleh ambil data ini
    sessionStorage.setItem('studentName', fullname);
    sessionStorage.setItem('studentIC', icNumber);
    
    // Redirect ke page dashboard pelajar (page kosong - "dashboard-pelajar.html")
    // Anda boleh tukar kepada fail yang dikehendaki nanti.
    window.location.href = "dashboard-pelajar.html";
  }

  // Validation ringkas (tidak kosong)
  const form = document.getElementById('loginForm');
  const fullnameInput = document.getElementById('fullname');
  const icInput = document.getElementById('icNumber');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    
    const fullname = fullnameInput.value.trim();
    const icNumber = icInput.value.trim();
    
    if (fullname === "") {
      alert("Sila masukkan Nama Penuh anda.");
      fullnameInput.focus();
      return;
    }
    
    if (icNumber === "") {
      alert("Sila masukkan Nombor Kad Pengenalan.");
      icInput.focus();
      return;
    }
    
    // Validation mudah untuk format IC (contoh: 6 digit - 2 digit - 4 digit, atau ringkas)
    // Optional: bukan validation ketat, hanya pastikan tiada aksara pelik.
    const icPattern = /^[0-9]{2}[0-9]{4}-[0-9]{2}-[0-9]{4}$|^[0-9]{12}$/;
    if (!icPattern.test(icNumber) && icNumber.length < 6) {
      // warning tapi masih benarkan? tapi lebih baik hint.
      if(!confirm("Nombor Kad Pengenalan tidak mengikut format biasa (cth: 050101-01-1234). Teruskan?")) {
        return;
      }
    }
    
    // Jika semua ok, redirect ke dashboard kosong
    redirectToDashboard(fullname, icNumber);
  });
</script>

<!-- NOTA: Halaman "dashboard-pelajar.html" belum dibuat. 
     Apabila pelajar login, sistem akan redirect ke page tersebut.
     Anda boleh cipta dashboard-pelajar.html kemudian dan sambung dengan kod yang diperlukan.
     Sementara itu, jika fail belum wujud, pelayar akan papar ralat 404.
     Disarankan untuk membuat dahulu dashboard-pelajar.html kosong sebagai placeholder.
-->
</body>
</html>
