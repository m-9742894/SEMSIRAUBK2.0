<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Akaun Guru | Dashboard Kaunselor</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e9eef6 100%);
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid rgba(79, 70, 229, 0.2);
    }
    .logo-area { display: flex; align-items: center; gap: 1rem; }
    .logo-icon {
      background: linear-gradient(145deg, #4f46e5, #7c3aed);
      width: 50px;
      height: 50px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon i { font-size: 1.8rem; color: white; }
    .logo-text h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1e293b, #4f46e5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-text p { font-size: 0.7rem; color: #5b6e8c; }
    .back-btn {
      background: #eef2ff;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      color: #4f46e5;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .back-btn:hover { background: #4f46e5; color: white; }
    .stats {
      background: white;
      border-radius: 1.2rem;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      display: inline-block;
    }
    .stats span { font-weight: 800; color: #4f46e5; font-size: 1.3rem; }
    
    /* Notifikasi Card */
    .notification-card {
      background: linear-gradient(135deg, #fff7ed, #ffedd5);
      border-radius: 1.2rem;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      border-left: 5px solid #f59e0b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .notification-card:hover {
      transform: translateX(5px);
      background: #fffbeb;
    }
    .notification-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .notification-icon {
      background: #fef3c7;
      width: 50px;
      height: 50px;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .notification-icon i {
      font-size: 1.5rem;
      color: #f59e0b;
    }
    .notification-info h4 {
      font-size: 0.9rem;
      color: #92400e;
      margin-bottom: 0.2rem;
    }
    .notification-info p {
      font-size: 0.7rem;
      color: #b45309;
    }
    .notification-badge {
      background: #f59e0b;
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .no-notification {
      background: #f1f5f9;
      border-left-color: #94a3b8;
    }
    .no-notification .notification-icon i {
      color: #94a3b8;
    }
    .no-notification .notification-info h4 {
      color: #64748b;
    }
    
    /* Search Section */
    .search-section {
      background: white;
      border-radius: 1.2rem;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }
    .search-wrapper {
      flex: 1;
      position: relative;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      padding: 0.7rem 1rem;
      border-radius: 50px;
      border: 1px solid #e2e8f0;
      transition: 0.2s;
    }
    .search-box:focus-within {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .search-box i { color: #94a3b8; }
    .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.9rem;
    }
    .suggestions-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      margin-top: 8px;
      display: none;
      border: 1px solid #e2e8f0;
    }
    .suggestions-list div {
      padding: 0.8rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      transition: 0.2s;
    }
    .suggestions-list div:hover { background: #f1f5f9; }
    .suggestions-list div .suggestion-name {
      font-weight: 700;
      color: #1e293b;
    }
    .suggestions-list div .suggestion-detail {
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 2px;
    }
    .refresh-btn {
      background: #f1f5f9;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .refresh-btn:hover { background: #e2e8f0; }
    .clear-search {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 0 8px;
      display: none;
    }
    .clear-search:hover { color: #ef4444; }
    
    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(79, 70, 229, 0.1);
    }
    .card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: #1f2a44;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid #4f46e5;
      padding-left: 12px;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.8rem;
      color: #1f2a44;
      margin-bottom: 0.4rem;
    }
    .form-group label i { margin-right: 6px; color: #4f46e5; }
    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      font-size: 0.9rem;
      font-family: inherit;
      border: 1.5px solid #e2e8f0;
      border-radius: 1rem;
      background: white;
      outline: none;
    }
    .form-group input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .btn-submit {
      background: linear-gradient(95deg, #4f46e5, #7c3aed);
      border: none;
      padding: 0.8rem;
      border-radius: 2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }
    .btn-submit:hover { transform: translateY(-2px); background: linear-gradient(95deg, #4338ca, #6d28d9); }
    .teacher-item {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      transition: 0.2s;
    }
    .teacher-item:hover { background: #f1f5f9; }
    .teacher-info { flex: 1; }
    .teacher-name {
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .teacher-detail { font-size: 0.75rem; color: #5b6e8c; margin-top: 4px; }
    .teacher-badge {
      background: #e0e7ff;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #4f46e5;
    }
    .btn-edit-full, .btn-delete {
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      border: none;
      margin-left: 0.3rem;
    }
    .btn-edit-full { background: #e0e7ff; color: #4f46e5; }
    .btn-edit-full:hover { background: #c7d2fe; }
    .btn-delete { background: #fee2e2; color: #dc2626; }
    .btn-delete:hover { background: #fecaca; }
    .empty-state { text-align: center; padding: 2rem; color: #94a3b8; }
    .success-msg {
      background: #dcfce7;
      color: #166534;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    
    /* Modal untuk pendaftar guru baru */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 1.5rem;
      max-height: 85vh;
      overflow-y: auto;
      animation: modalFadeIn 0.3s ease;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: white;
      border-radius: 1.5rem 1.5rem 0 0;
    }
    .modal-header h3 { color: #1e293b; font-size: 1.2rem; }
    .modal-header h3 i { color: #f59e0b; margin-right: 8px; }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #94a3b8;
      transition: 0.2s;
    }
    .modal-close:hover { color: #dc2626; }
    .modal-body { padding: 1.5rem; }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.8rem 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .info-row span:first-child {
      font-weight: 600;
      color: #64748b;
    }
    .info-row span:last-child {
      font-weight: 600;
      color: #1e293b;
    }
    .modal-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .btn-accept {
      flex: 1;
      background: #10b981;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-accept:hover { background: #059669; transform: translateY(-2px); }
    .btn-reject {
      flex: 1;
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-reject:hover { background: #dc2626; transform: translateY(-2px); }
    
    @media (max-width: 900px) {
      body { padding: 1rem; }
      .notification-card { flex-direction: column; text-align: center; }
      .notification-left { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-chalkboard-user"></i></div>
      <div class="logo-text">
        <h1>Akaun Guru</h1>
        <p>Urus data profil guru • Firebase Cloud</p>
      </div>
    </div>
    <a href="dashboard-kaunselor.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
  </div>

  <div class="stats">
    <i class="fas fa-user-tie"></i> Jumlah Guru: <span id="totalTeachers">0</span>
  </div>

  <!-- NOTIFICATION CARD - PENDAFTAR GURU BARU -->
  <div id="notificationCard" class="notification-card" onclick="openPendingTeachersModal()">
    <div class="notification-left">
      <div class="notification-icon">
        <i class="fas fa-user-plus"></i>
      </div>
      <div class="notification-info">
        <h4>Pendaftar Guru Baru</h4>
        <p>Terdapat guru baru yang mendaftar</p>
      </div>
    </div>
    <div class="notification-badge" id="pendingCount">0</div>
  </div>

  <!-- SEARCH SECTION -->
  <div class="search-section">
    <div class="search-wrapper">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Cari guru (nama, IC, atau kelas)..." autocomplete="off">
        <button class="clear-search" id="clearSearchBtn"><i class="fas fa-times-circle"></i></button>
      </div>
      <div id="suggestionsList" class="suggestions-list"></div>
    </div>
    <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Muat Semula</button>
  </div>

  <!-- Add Teacher Form -->
  <div class="card">
    <h2><i class="fas fa-user-plus"></i> Tambah Guru Baru</h2>
    <form id="addTeacherForm">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Nama Penuh</label>
        <input type="text" id="fullname" placeholder="cth: Puan Sarah binti Abdullah" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-id-card"></i> Nombor Kad Pengenalan</label>
        <input type="text" id="icNumber" placeholder="cth: 800101-01-1234" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-school"></i> Mengajar Kelas / Tingkatan</label>
        <input type="text" id="teacherClass" placeholder="cth: 5 Cemerlang, Tingkatan 4 Amanah">
      </div>
      <div class="form-group">
        <label><i class="fas fa-calendar"></i> Tahun / Sesi</label>
        <input type="text" id="year" placeholder="cth: 2024, 2025, 2026" value="2026">
      </div>
      <button type="submit" class="btn-submit"><i class="fas fa-cloud-upload-alt"></i> Daftar ke Firebase</button>
    </form>
  </div>

  <!-- Teacher List -->
  <div class="card">
    <h2><i class="fas fa-list"></i> Senarai Guru Berdaftar</h2>
    <div id="teacherListContainer">
      <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Memuat data dari Firebase...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCfu7XC8pXtpDyQ-9Cjdg4AobA-EVEwWcc",
    authDomain: "e-mindcare.firebaseapp.com",
    projectId: "e-mindcare",
    storageBucket: "e-mindcare.firebasestorage.app",
    messagingSenderId: "1021883944936",
    appId: "1:1021883944936:web:39c75a0c98d19a37afde5d",
    measurementId: "G-3CJVKWGEXV"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const teachersCollection = collection(db, "teachers");
  const pendingTeachersCollection = collection(db, "pending_teachers");
  
  let teachers = [];
  let allTeachers = [];
  let pendingTeachers = [];
  let currentSelectedPendingId = null;

  // ==================== LOAD PENDING TEACHERS ====================
  async function loadPendingTeachers() {
    try {
      const querySnapshot = await getDocs(pendingTeachersCollection);
      pendingTeachers = [];
      querySnapshot.forEach((doc) => {
        pendingTeachers.push({ id: doc.id, ...doc.data() });
      });
      updatePendingNotification();
      console.log("Pending teachers loaded:", pendingTeachers.length);
    } catch (error) {
      console.error("Error loading pending teachers:", error);
    }
  }

  function updatePendingNotification() {
    const count = pendingTeachers.length;
    const badge = document.getElementById('pendingCount');
    const notificationCard = document.getElementById('notificationCard');
    
    badge.innerText = count;
    
    if (count === 0) {
      notificationCard.classList.add('no-notification');
      const infoDiv = notificationCard.querySelector('.notification-info');
      if (infoDiv) {
        infoDiv.innerHTML = '<h4>Tiada Pendaftar Baru</h4><p>Semua pendaftar telah diproses</p>';
      }
    } else {
      notificationCard.classList.remove('no-notification');
      const infoDiv = notificationCard.querySelector('.notification-info');
      if (infoDiv) {
        infoDiv.innerHTML = '<h4>Pendaftar Guru Baru</h4><p>Terdapat guru baru yang mendaftar</p>';
      }
    }
  }

  // ==================== MODAL UNTUK PENDAFTAR ====================
  window.openPendingTeachersModal = function() {
    if (pendingTeachers.length === 0) {
      alert("Tiada pendaftar guru baru pada masa ini.");
      return;
    }
    
    let modalHtml = `
      <div id="pendingModal" class="modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3><i class="fas fa-user-clock"></i> Senarai Pendaftar Guru Baru</h3>
            <button class="modal-close" onclick="closePendingModal()">&times;</button>
          </div>
          <div class="modal-body">
    `;
    
    if (pendingTeachers.length === 0) {
      modalHtml += `<p style="text-align:center; color:#94a3b8;">Tiada pendaftar baru.</p>`;
    } else {
      for (const teacher of pendingTeachers) {
        modalHtml += `
          <div style="background:#f8fafc; border-radius:1rem; padding:1rem; margin-bottom:1rem; border-left:4px solid #f59e0b;">
            <div class="info-row"><span>Nama:</span><span>${escapeHtml(teacher.fullname)}</span></div>
            <div class="info-row"><span>No. IC:</span><span>${escapeHtml(teacher.icNumber)}</span></div>
            <div class="info-row"><span>Kelas Ajar:</span><span>${escapeHtml(teacher.teacherClass || '-')}</span></div>
            <div class="info-row"><span>Tahun:</span><span>${escapeHtml(teacher.year || '2026')}</span></div>
            <div class="info-row"><span>Tarikh Daftar:</span><span>${teacher.createdAt ? new Date(teacher.createdAt).toLocaleDateString('ms-MY') : '-'}</span></div>
            <div class="modal-buttons" style="margin-top:1rem;">
              <button class="btn-accept" onclick="acceptPendingTeacher('${teacher.id}', '${escapeHtml(teacher.fullname)}', '${escapeHtml(teacher.icNumber)}', '${escapeHtml(teacher.teacherClass || '')}', '${teacher.year || '2026'}')">
                <i class="fas fa-check"></i> Terima
              </button>
              <button class="btn-reject" onclick="rejectPendingTeacher('${teacher.id}', '${escapeHtml(teacher.fullname)}')">
                <i class="fas fa-times"></i> Tolak
              </button>
            </div>
          </div>
        `;
      }
    }
    
    modalHtml += `
          </div>
        </div>
      </div>
    `;
    
    document.body.insertAdjacentHTML('beforeend', modalHtml);
  };
  
  window.closePendingModal = function() {
    const modal = document.getElementById('pendingModal');
    if (modal) modal.remove();
  };
  
  // ==================== TERIMA PENDAFTAR GURU ====================
  window.acceptPendingTeacher = async function(id, fullname, icNumber, teacherClass, year) {
    if (!confirm(`Terima pendaftar "${fullname}" sebagai guru?`)) return;
    
    try {
      // Check if teacher already exists
      const q = query(teachersCollection, where("icNumber", "==", icNumber));
      const existing = await getDocs(q);
      
      if (!existing.empty) {
        alert(`❌ Guru dengan No. IC ${icNumber} sudah wujud dalam sistem!`);
        return;
      }
      
      // Add to teachers collection
      const newTeacher = {
        fullname: fullname,
        icNumber: icNumber,
        teacherClass: teacherClass || "-",
        year: year || "2026",
        createdAt: new Date().toISOString(),
        acceptedFrom: "pending_registration"
      };
      
      await addDoc(teachersCollection, newTeacher);
      
      // Delete from pending_teachers
      await deleteDoc(doc(db, "pending_teachers", id));
      
      // Refresh data
      await loadPendingTeachers();
      await loadTeachers();
      closePendingModal();
      
      alert(`✅ Guru "${fullname}" berjaya didaftarkan!`);
    } catch (error) {
      console.error("Error accepting teacher:", error);
      alert("❌ Gagal menerima pendaftar. Sila cuba lagi.");
    }
  };
  
  // ==================== TOLAK PENDAFTAR GURU ====================
  window.rejectPendingTeacher = async function(id, fullname) {
    if (!confirm(`Tolak pendaftar "${fullname}"? Data akan dipadam secara kekal.`)) return;
    
    try {
      await deleteDoc(doc(db, "pending_teachers", id));
      await loadPendingTeachers();
      closePendingModal();
      alert(`✅ Pendaftar "${fullname}" telah ditolak dan data dipadam.`);
    } catch (error) {
      console.error("Error rejecting teacher:", error);
      alert("❌ Gagal menolak pendaftar. Sila cuba lagi.");
    }
  };

  // ==================== LOAD TEACHERS ====================
  async function loadTeachers() {
    try {
      const querySnapshot = await getDocs(teachersCollection);
      teachers = [];
      querySnapshot.forEach((doc) => {
        teachers.push({ id: doc.id, ...doc.data() });
      });
      allTeachers = [...teachers];
      renderTeacherList(teachers);
      updateTotalCount();
      console.log("Teachers loaded from Firebase:", teachers.length);
    } catch (error) {
      console.error("Error loading teachers:", error);
      document.getElementById('teacherListContainer').innerHTML = '<div class="empty-state">Gagal memuat data guru.</div>';
    }
  }

  // ==================== ADD TEACHER ====================
  async function addTeacherToFirebase(fullname, icNumber, teacherClass, year) {
    try {
      const q = query(teachersCollection, where("icNumber", "==", icNumber));
      const querySnapshot = await getDocs(q);
      
      if (!querySnapshot.empty) {
        const existing = querySnapshot.docs[0];
        return { success: false, message: `No. IC ${icNumber} sudah wujud untuk ${existing.data().fullname}` };
      }
      
      const newTeacher = {
        fullname: fullname.trim(),
        icNumber: icNumber.trim(),
        teacherClass: teacherClass.trim() || "-",
        year: year.trim() || "2026",
        createdAt: new Date().toISOString()
      };
      
      const docRef = await addDoc(teachersCollection, newTeacher);
      teachers.push({ id: docRef.id, ...newTeacher });
      allTeachers = [...teachers];
      renderTeacherList(teachers);
      updateTotalCount();
      return { success: true };
    } catch (error) {
      console.error("Error adding teacher:", error);
      return { success: false, message: "Ralat Firebase: " + error.message };
    }
  }

  // ==================== DELETE TEACHER ====================
  async function deleteTeacherFromFirebase(id, teacherName) {
    if (!confirm(`Padam guru "${teacherName}"?`)) return;
    
    try {
      await deleteDoc(doc(db, "teachers", id));
      teachers = teachers.filter(t => t.id !== id);
      allTeachers = [...teachers];
      renderTeacherList(teachers);
      updateTotalCount();
      alert("Guru berjaya dipadam.");
    } catch (error) {
      console.error("Error deleting teacher:", error);
      alert("Gagal memadam guru: " + error.message);
    }
  }

  // ==================== EDIT TEACHER ====================
  async function editTeacherFullInFirebase(id, newFullname, newIcNumber, newTeacherClass, newYear) {
    try {
      if (newIcNumber) {
        const q = query(teachersCollection, where("icNumber", "==", newIcNumber));
        const querySnapshot = await getDocs(q);
        let icExists = false;
        querySnapshot.forEach((docSnap) => {
          if (docSnap.id !== id) icExists = true;
        });
        if (icExists) {
          alert(`❌ No. IC ${newIcNumber} sudah wujud untuk guru lain!`);
          return false;
        }
      }
      
      const teacherRef = doc(db, "teachers", id);
      const updateData = {};
      if (newFullname) updateData.fullname = newFullname.trim();
      if (newIcNumber) updateData.icNumber = newIcNumber.trim();
      if (newTeacherClass !== undefined) updateData.teacherClass = newTeacherClass.trim() || "-";
      if (newYear !== undefined) updateData.year = newYear.trim() || "2026";
      
      await updateDoc(teacherRef, updateData);
      
      const teacher = teachers.find(t => t.id === id);
      if (teacher) {
        if (newFullname) teacher.fullname = newFullname.trim();
        if (newIcNumber) teacher.icNumber = newIcNumber.trim();
        if (newTeacherClass !== undefined) teacher.teacherClass = newTeacherClass.trim() || "-";
        if (newYear !== undefined) teacher.year = newYear.trim() || "2026";
      }
      
      allTeachers = [...teachers];
      renderTeacherList(teachers);
      alert("✅ Maklumat guru berjaya dikemaskini!");
      return true;
    } catch (error) {
      console.error("Error editing teacher:", error);
      alert("Gagal mengemaskini guru: " + error.message);
      return false;
    }
  }

  // ==================== SEARCH & AUTO SUGGESTION ====================
  function filterTeachers(searchTerm) {
    if (!searchTerm.trim()) {
      renderTeacherList(allTeachers);
      return;
    }
    const term = searchTerm.toLowerCase();
    const filtered = allTeachers.filter(teacher => 
      teacher.fullname?.toLowerCase().includes(term) ||
      teacher.icNumber?.toLowerCase().includes(term) ||
      teacher.teacherClass?.toLowerCase().includes(term) ||
      teacher.year?.toLowerCase().includes(term)
    );
    renderTeacherList(filtered);
  }

  function updateSuggestions(searchTerm) {
    const suggestionsDiv = document.getElementById('suggestionsList');
    const clearBtn = document.getElementById('clearSearchBtn');
    
    if (!searchTerm.trim()) {
      suggestionsDiv.style.display = 'none';
      clearBtn.style.display = 'none';
      return;
    }
    
    clearBtn.style.display = 'block';
    const term = searchTerm.toLowerCase();
    const matches = allTeachers.filter(teacher => 
      teacher.fullname?.toLowerCase().includes(term) ||
      teacher.icNumber?.toLowerCase().includes(term) ||
      teacher.teacherClass?.toLowerCase().includes(term)
    ).slice(0, 8);
    
    if (matches.length === 0) {
      suggestionsDiv.innerHTML = `<div style="padding:0.8rem;color:#94a3b8;"><i class="fas fa-info-circle"></i> Tiada guru dijumpai</div>`;
      suggestionsDiv.style.display = 'block';
      return;
    }
    
    suggestionsDiv.innerHTML = matches.map(match => `
      <div onclick="selectSuggestion('${match.id}')">
        <div class="suggestion-name">
          <i class="fas fa-user-tie" style="color:#4f46e5; font-size:0.8rem;"></i>
          ${escapeHtml(match.fullname)}
        </div>
        <div class="suggestion-detail">
          <i class="fas fa-id-card"></i> ${escapeHtml(match.icNumber)} &nbsp;|&nbsp;
          <i class="fas fa-school"></i> ${escapeHtml(match.teacherClass)} &nbsp;|&nbsp;
          <i class="fas fa-calendar"></i> ${match.year}
        </div>
      </div>
    `).join('');
    suggestionsDiv.style.display = 'block';
  }

  window.selectSuggestion = function(teacherId) {
    const teacher = allTeachers.find(t => t.id === teacherId);
    if (teacher) {
      document.getElementById('searchInput').value = teacher.fullname;
      document.getElementById('suggestionsList').style.display = 'none';
      filterTeachers(teacher.fullname);
    }
  };

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('suggestionsList').style.display = 'none';
    document.getElementById('clearSearchBtn').style.display = 'none';
    renderTeacherList(allTeachers);
  }

  function openTeacherDetailDialog(id, teacherName, teacherIc, teacherClass, teacherYear) {
    const newName = prompt("✏️ Edit Nama Penuh:", teacherName);
    if (newName === null) return;
    if (newName.trim() === "") { alert("Nama tidak boleh kosong!"); return; }
    
    const newIc = prompt("✏️ Edit No. Kad Pengenalan:", teacherIc);
    if (newIc === null) return;
    if (newIc.trim() === "") { alert("No. IC tidak boleh kosong!"); return; }
    
    const newClass = prompt("✏️ Edit Kelas / Tingkatan Ajar:", teacherClass);
    if (newClass === null) return;
    
    const newYear = prompt("✏️ Edit Tahun:", teacherYear);
    if (newYear === null) return;
    
    editTeacherFullInFirebase(id, newName, newIc, newClass, newYear);
  }

  function renderTeacherList(teachersToRender) {
    const container = document.getElementById('teacherListContainer');
    
    if (teachersToRender.length === 0) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash" style="font-size: 2rem;"></i><p>Tiada guru berdaftar.</p></div>`;
      return;
    }

    container.innerHTML = teachersToRender.map(teacher => `
      <div class="teacher-item">
        <div class="teacher-info">
          <div class="teacher-name">
            <i class="fas fa-chalkboard-user" style="color:#4f46e5;"></i>
            ${escapeHtml(teacher.fullname)}
            <span class="teacher-badge"><i class="fas fa-id-card"></i> ${escapeHtml(teacher.icNumber)}</span>
          </div>
          <div class="teacher-detail">
            <i class="fas fa-school"></i> Mengajar Kelas: ${escapeHtml(teacher.teacherClass)} &nbsp;|&nbsp;
            <i class="fas fa-calendar"></i> Tahun: ${teacher.year}
          </div>
        </div>
        <div>
          <button class="btn-edit-full" onclick="openTeacherDetailDialog('${teacher.id}', '${escapeHtml(teacher.fullname)}', '${escapeHtml(teacher.icNumber)}', '${escapeHtml(teacher.teacherClass)}', '${teacher.year}')">
            <i class="fas fa-edit"></i> Edit
          </button>
          <button class="btn-delete" onclick="deleteTeacherFromFirebase('${teacher.id}', '${escapeHtml(teacher.fullname)}')">
            <i class="fas fa-trash-alt"></i> Hapus
          </button>
        </div>
      </div>
    `).join('');
  }

  function updateTotalCount() {
    document.getElementById('totalTeachers').innerText = teachers.length;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ==================== EVENT LISTENERS ====================
  const addForm = document.getElementById('addTeacherForm');
  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fullname = document.getElementById('fullname').value;
    const icNumber = document.getElementById('icNumber').value;
    const teacherClass = document.getElementById('teacherClass').value;
    const year = document.getElementById('year').value;
    
    if (!fullname.trim()) { alert("Sila masukkan Nama Penuh."); return; }
    if (!icNumber.trim()) { alert("Sila masukkan No. Kad Pengenalan."); return; }
    
    const result = await addTeacherToFirebase(fullname, icNumber, teacherClass, year);
    if (result.success) {
      addForm.reset();
      document.getElementById('year').value = '2026';
      alert(`✅ Guru ${fullname} berjaya didaftarkan!`);
    } else {
      alert(`❌ Gagal: ${result.message}`);
    }
  });

  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', (e) => {
    updateSuggestions(e.target.value);
    filterTeachers(e.target.value);
  });
  
  document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    await loadTeachers();
    await loadPendingTeachers();
    searchInput.value = '';
    clearSearch();
    alert("Data berjaya dimuat semula!");
  });
  
  document.addEventListener('click', function(e) {
    const wrapper = document.querySelector('.search-wrapper');
    if (wrapper && !wrapper.contains(e.target)) {
      document.getElementById('suggestionsList').style.display = 'none';
    }
  });

  // Make functions global for onclick
  window.openTeacherDetailDialog = openTeacherDetailDialog;
  window.deleteTeacherFromFirebase = deleteTeacherFromFirebase;
  window.editTeacherFullInFirebase = editTeacherFullInFirebase;

  // Initialize
  await loadTeachers();
  await loadPendingTeachers();
</script>
</body>
</html>
