    const firebaseConfig = {

    // Student data
    const studentName = sessionStorage.getItem('studentName') || localStorage.getItem('studentName') || 'Pelajar';

    // ==================== SOALAN PERSONALITI WARNA (4 WARNA x 25 SOALAN = 100 SOALAN) ====================

    const soalanBiru = [
        "SAYA MUDAH MESRA BILA BERHUBUNG DENGAN ORANG LAIN.",

        "SAYA SUKA MENUNJUKKAN KEPERIBADIAN SAYA SEBENAR DALAM SEMUA KEADAAN.",
        "SAYA SELALU MEMBERI DORONGAN KEPADA ORANG LAIN UNTUK MELAKUKAN SESUATU PEKERJAAN.",

    const soalanHijau = [

        "SAYA GEMAR MEMBAHASKAN TEORI.",
        "SAYA SEORANG BERTANGGUNGJAWAB.",
        "SAYA CENDERUNG UNTUK MEREKA CIPTA SESUATU YANG BARU.",
        "SAYA BERKEBOLEHAN MENJALANKAN SESUATU TUGAS DENGAN SEMPURNA.",
        "SAYA SENTIASA BERSIFAT INGIN TAHU YANG TINGGI TERHADAP SESUATU.",
        "SAYA ADALAH SEORANG YANG TENANG.",
        "SAYA BERMINAT MENYERTAI PERTANDINGAN YANG MENCABAR MINDA SAYA.",
        "BAGI SAYA KERJA ITU ADALAH SUATU PERMAINAN.",
        "SAYA SEORANG YANG SANGAT MENYUKAI TUGAS-TUGAS YANG MENCABAR.",
        "SAYA SUKA MEREKACIPTA SESUATU MODEL.",
        "SAYA LEBIH SUKA MENEROKA IDEA-IDEA BARU.",
        "SAYA BERMINAT UNTUK MENYERTAI AKTIVITI-AKTIVITI BERBENTUK ILMIAH.",
        "SAYA AKAN BERALIH KE PROJEK YANG BARU SETELAH MENYELESAIKAN TUGAS YANG LAMA."
    ];
    
    const soalanJingga = [
        "SAYA ADALAH DALAM GOLONGAN ORANG YANG PANDAI.",
        "SAYA ISIKAN MASA LAPANG DENGAN AKTIVITI LUAR YANG MENYERONOKKAN.",
        "SAYA SUKA BERGAUL DENGAN SEMUA ORANG.",
        "SAYA TIDAK GENTAR DENGAN SEBARANG CABARAN.",
        "SAYA SEORANG YANG SUKA AKTIVITI PERKHEMAHAN.",
        "PERSAINGAN ADALAH BAIK BAGI SAYA.",
        "SAYA SUKAKAN PERKARA YANG BERBENTUK AMALI DARIPADA TEORI.",
        "SAYA SELALU MENIMBULKAN SUASANA KECERIAAN KETIKA TEGANG.",
        "SAYA SELALU MEMBERIKAN GERAK YANG SPONTAN DALAM SETIAP TINDAKAN.",
        "SAYA SUKA KEPADA SESUATU YANG LUAR BISA DAN MENCABAR.",
        "SAYA SUKA AKTIVITI YANG BERBAHAYA TETAPI MENYERONOKKAN.",
        "SAYA SEORANG YANG KELAKAR.",
        "SAYA TIDAK SUKA PELAJARAN YANG MEMERLUKAN PEMBACAAN YANG BANYAK.",
        "SAYA SUKA AKTIVITI KOKURIKULUM YANG LASAK.",
        "SAYA BOSAN DENGAN KERJA BERSTRUKTUR.",
        "SAYA BOSAN DENGAN KERJA-KERJA RIGID.",
        "SAYA BOSAN DENGAN KERJA RUTIN.",
        "SAYA PUAS HATI DENGAN KERJA YANG MELIBATKAN KEBEBASAN.",
        "SAYA PUAS HATI DENGAN KERJA YANG DAPAT MENGGUNAKAN KOORDINASI FIZIKAL.",
        "SAYA BERPUAS HATI DENGAN KERJA YANG MENGGUNAKAN PERALATAN.",
        "SAYA SEORANG PERFORMER SEMULAJADI",
        "SAYA TIDAK SUKA DIKONGKONG.",
        "SAYA TIDAK SUKA PADA PERATURAN.",
        "PEKERJAAN TANPA JADUAL SANGAT MENARIK MINAT SAYA",
        "SAYA SUKA MELAKUKAN KERJA TANPA TEKANAN."
    ];
    
    // Build questions array (100 soalan)
    let allQuestions = [];
    for (let i = 0; i < 25; i++) {
        allQuestions.push({ text: soalanEmas[i], cat: "EMAS" });
        allQuestions.push({ text: soalanBiru[i], cat: "BIRU" });
        allQuestions.push({ text: soalanHijau[i], cat: "HIJAU" });
        allQuestions.push({ text: soalanJingga[i], cat: "JINGGA" });
    }
    console.log("Total soalan:", allQuestions.length); // 100
    
    let answers = {};
    let currentIndex = 0;
    let scores = { EMAS: 0, BIRU: 0, HIJAU: 0, JINGGA: 0 };
    let hasCompleted = false;
    let existingResultId = null;
    
    const catColors = {
        EMAS: "#fbbf24", BIRU: "#3b82f6", HIJAU: "#10b981", JINGGA: "#f97316"
    };
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function saveProgress() {
        localStorage.setItem('warna_progress', JSON.stringify({
            currentIndex, answers, scores, hasCompleted
        }));
    }
    
    function loadProgress() {
        const saved = localStorage.getItem('warna_progress');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (!data.hasCompleted) {
                    currentIndex = data.currentIndex;
                    answers = data.answers;
                    scores = data.scores;
                    hasCompleted = data.hasCompleted;
                }
            } catch(e) {}
        }
    }
    
    async function checkExistingResult() {
        try {
            const q = query(ujianResultsCollection, where("studentIC", "==", studentIC));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                querySnapshot.forEach((doc) => {
                    hasCompleted = true;
                    existingResultId = doc.id;
                });
                return true;
            }
            return false;
        } catch (error) {
            console.error("Error checking existing result:", error);
            return false;
        }
    }
    
    async function saveResultToFirestore() {
        // Get dominant color (highest score)
        let dominantColor = "EMAS";
        let highestScore = 0;
        for (const [color, score] of Object.entries(scores)) {
            if (score > highestScore) {
                highestScore = score;
                dominantColor = color;
            }
        }
        
        const resultData = {
            studentName: studentName,
            studentIC: studentIC,
            studentClass: studentClass,
            studentSession: studentSession,
            date: currentDate,
            time: currentTime,
            day: currentDay,
            scores: scores,
            dominantColor: dominantColor,
            dominantScore: highestScore,
            completedAt: new Date().toISOString(),
            status: "completed"
        };
        
        try {
            if (existingResultId) {
                await updateDoc(doc(db, "ujian_personaliti_warna", existingResultId), resultData);
            } else {
                await setDoc(doc(db, "ujian_personaliti_warna", `${studentIC}_${Date.now()}`), resultData);
            }
            showToast("✅ Jawapan anda telah disimpan!");
            return true;
        } catch (error) {
            console.error("Error saving result:", error);
            showToast("❌ Gagal menyimpan jawapan");
            return false;
        }
    }

                <div class="profile-grid">
                    <div class="profile-item"><div class="label">Nama Penuh</div><div class="value">${studentName}</div></div>
                    <div class="profile-item"><div class="label">No. Kad Pengenalan</div><div class="value">${studentIC}</div></div>
                    <div class="profile-item"><div class="label">Kelas</div><div class="value">${studentClass}</div></div>
                    <div class="profile-item"><div class="label">Tarikh / Masa</div><div class="value">${currentDate} • ${currentTime}</div></div>
                    <div class="profile-item"><div class="label">Hari</div><div class="value">${currentDay}</div></div>
                </div>
            </div>
        `;
    }
    
    function renderProgress() {
        const percent = (currentIndex / allQuestions.length) * 100;
        return `
            <div class="progress-container">
                <div class="progress-bar" style="width: ${percent}%;"></div>
            </div>
            <div class="progress-text">Soalan ${currentIndex + 1} / ${allQuestions.length}</div>
        `;
    }
    
    function getCatClass(cat) {
        if (cat === "EMAS") return "cat-emas";
        if (cat === "BIRU") return "cat-biru";
        if (cat === "HIJAU") return "cat-hijau";
        return "cat-jingga";
    }
    
    function renderQuestion() {
        if (currentIndex >= allQuestions.length) {
            renderResult();
            return;
        }
        
        const q = allQuestions[currentIndex];
        const selected = answers[currentIndex];
        
        const html = `
            ${renderProfile()}
            ${renderProgress()}
            <div class="question-card">
                <div class="question-header">
                    <span class="question-num">Soalan ${currentIndex + 1}</span>
                    <span class="question-cat ${getCatClass(q.cat)}">${q.cat}</span>
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options">
                    <button class="option-btn option-yes ${selected === true ? 'option-selected-yes' : ''}" onclick="answerQuestion(true)">
                        <i class="fas fa-check-circle"></i> YA
                    </button>
                    <button class="option-btn option-no ${selected === false ? 'option-selected-no' : ''}" onclick="answerQuestion(false)">
                        <i class="fas fa-times-circle"></i> TIDAK
                    </button>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>
                    <i class="fas fa-arrow-left"></i> Sebelum
                </button>
                <button class="nav-btn nav-btn-primary" onclick="nextQuestion()">
                    ${currentIndex === allQuestions.length - 1 ? 'Selesai' : 'Seterusnya'} <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }
    
    window.answerQuestion = function(answer) {
        const q = allQuestions[currentIndex];
        const previousAnswer = answers[currentIndex];
        
        if (previousAnswer !== undefined) {
            if (previousAnswer === true) scores[q.cat]--;
        }
        
        answers[currentIndex] = answer;
        if (answer === true) {
            scores[q.cat]++;
        }
        
        saveProgress();
        
        const yesBtn = document.querySelector('.option-yes');
        const noBtn = document.querySelector('.option-no');
        if (yesBtn && noBtn) {
            if (answer === true) {
                yesBtn.classList.add('option-selected-yes');
                noBtn.classList.remove('option-selected-no');
            } else {
                noBtn.classList.add('option-selected-no');
                yesBtn.classList.remove('option-selected-yes');
            }
        }
    };
    
    window.nextQuestion = function() {
        if (answers[currentIndex] === undefined) {
            showToast("Sila jawab soalan ini terlebih dahulu");
            return;
        }
        
        if (currentIndex < allQuestions.length - 1) {
            currentIndex++;
            saveProgress();
            renderQuestion();
        } else {
            submitUjian();
        }
    };
    
    window.prevQuestion = function() {
        if (currentIndex > 0) {
            currentIndex--;
            saveProgress();
            renderQuestion();
        }
    };
    
    async function submitUjian() {
        const totalAnswered = Object.keys(answers).length;
        if (totalAnswered < allQuestions.length) {
            showToast(`Sila jawab semua soalan (${allQuestions.length - totalAnswered} soalan lagi)`);
            return;
        }
        
        await saveResultToFirestore();
        hasCompleted = true;
        localStorage.removeItem('warna_progress');
        renderResult();
    }
    
    function getDominantColor() {
        let dominant = "EMAS";
        let highest = 0;
        for (const [color, score] of Object.entries(scores)) {
            if (score > highest) {
                highest = score;
                dominant = color;
            }
        }
        return { dominant, score: highest };
    }
    
    function getColorDescription(color) {
        const descriptions = {
            EMAS: "Personaliti EMAS melambangkan individu yang bertanggungjawab, teratur, disiplin, dan menghargai tradisi. Anda adalah seorang yang boleh diharapkan, suka membantu, dan sentiasa mematuhi peraturan. Anda cenderung menjadi tulang belakang dalam sesebuah organisasi.",
            BIRU: "Personaliti BIRU melambangkan individu yang kreatif, ekspresif, dan berperasaan. Anda seorang yang idealistik, suka membantu orang lain, dan mempunyai empati yang tinggi. Anda menghargai hubungan yang bermakna dan sering menjadi pendengar yang baik.",
            HIJAU: "Personaliti HIJAU melambangkan individu yang analitikal, logikal, dan berfikiran strategik. Anda seorang yang ingin tahu, suka menyelesaikan masalah, dan sentiasa mencari ilmu pengetahuan baru. Anda cemerlang dalam bidang yang memerlukan pemikiran kritikal.",
            JINGGA: "Personaliti JINGGA melambangkan individu yang bertenaga, spontan, dan suka mencabar. Anda seorang yang berani, suka pengembaraan, dan tidak takut mengambil risiko. Anda cemerlang dalam situasi yang memerlukan tindakan pantas dan kebolehan menyesuaikan diri."
        };
        return descriptions[dominant] || "";
    }
    
    function renderResult() {
        const { dominant, score } = getDominantColor();
        const percent = (score / 25) * 100;
        
        const colorName = {
            EMAS: "EMAS", BIRU: "BIRU", HIJAU: "HIJAU", JINGGA: "JINGGA"
        };
        
        const colorClass = {
            EMAS: "color-emas", BIRU: "color-biru", HIJAU: "color-hijau", JINGGA: "color-jingga"
        };
        
        // Bar chart for all colors
        let barsHtml = '';
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        for (let [color, sc] of sorted) {
            const perc = (sc / 25) * 100;
            barsHtml += `
                <div class="result-bar">
                    <div class="result-bar-label">
                        <span><strong>${color}</strong></span>
                        <span>${sc} / 25</span>
                    </div>
                    <div class="result-bar-fill">
                        <span style="width: ${perc}%; background: ${catColors[color]};"></span>
                    </div>
                </div>
            `;
        }
        
        const html = `
            ${renderProfile()}
            <div class="result-card">
                <div class="result-title">
                    <i class="fas fa-palette"></i> KEPUTUSAN INVENTORI PERSONALITI WARNA
                </div>
                
                <div class="dominant-color">
                    <div class="dominant-badge ${colorClass[dominant]}">
                        🎨 WARNA DOMINAN: ${colorName[dominant]}
                    </div>
                    <div class="color-desc">
                        ${getColorDescription(dominant)}
                    </div>
                    <p style="margin-top: 1rem; font-size: 0.8rem; color: #64748b;">
                        Skor anda: ${score}/25 (${Math.round(percent)}%)
                    </p>
                </div>
                
                <div class="result-chart">
                    <h4 style="margin-bottom: 1rem;">📊 Perincian Skor Setiap Warna</h4>
                    ${barsHtml}
                </div>
                
                <div style="background: #f1f5f9; border-radius: 1rem; padding: 1rem; margin-top: 1rem;">
                    <p style="font-size: 0.8rem; color: #64748b; text-align: center;">
                        <i class="fas fa-info-circle"></i> Personaliti warna dominan menunjukkan kecenderungan semula jadi anda dalam berinteraksi dan membuat keputusan.
                    </p>
                    <p style="font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 0.5rem;">
                        Tarikh: ${currentDate} | Masa: ${currentTime} | Hari: ${currentDay}
                    </p>
                </div>
                
                <button class="btn-submit" onclick="window.location.href='psikometrik.html'">
                    <i class="fas fa-check-circle"></i> Selesai & Kembali
                </button>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }
    
    function renderLocked() {
        const html = `
            ${renderProfile()}
            <div class="locked-message">
                <i class="fas fa-lock" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h3>Ujian Telah Selesai</h3>
                <p>Anda telah pun menjawab Inventori Personaliti Warna ini.</p>
                <p>Sila rujuk kaunselor untuk reset ujian jika perlu.</p>
                <button class="btn-submit" style="background: #64748b; margin-top: 1rem;" onclick="window.location.href='psikometrik.html'">
                    <i class="fas fa-arrow-left"></i> Kembali ke Senarai Ujian
                </button>
            </div>
        `;
        document.getElementById('contentArea').innerHTML = html;
    }
    
    async function init() {
        const exists = await checkExistingResult();
        if (exists) {
            renderLocked();
        } else {
            loadProgress();
            if (hasCompleted) {
                renderResult();
            } else {
                renderQuestion();
            }
        }
    }
    
    window.answerQuestion = answerQuestion;
    window.nextQuestion = nextQuestion;
    window.prevQuestion = prevQuestion;
    
    init();
</script>
</body>
</html>
