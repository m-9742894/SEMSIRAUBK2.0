<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login Guru | E-MindCare SEMSIRA</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #e8f0fe 0%, #dfe7f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: floatAnim 20s infinite alternate;
    }
    .orb1 {
      width: 500px;
      height: 500px;
      background: #60a5fa;
      top: -150px;
      left: -150px;
    }
    .orb2 {
      width: 600px;
      height: 600px;
      background: #c084fc;
      bottom: -200px;
      right: -150px;
      animation-duration: 25s;
    }
    @keyframes floatAnim {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }

    .login-container {
      max-width: 520px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2.2rem 2rem 2.5rem;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-icon {
      background: linear-gradient(145deg, #2563eb, #7c3aed);
      width: 70px;
      height: 70px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 12px 20px -8px rgba(37, 99, 235, 0.4);
    }
    .login-icon i {
      font-size: 2.4rem;
      color: white;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1e293b, #2563eb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub {
      color: #5b6e8c;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }
    .input-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f2a44;
      margin-bottom: 0.5rem;
    }
    .input-group label i {
      margin-right: 6px;
      color: #2563eb;
    }
    .input-field {
      width: 100%;
      padding: 0.9rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.2rem;
      background: white;
      transition: all 0.2s;
      outline: none;
    }
    .input-field:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(95deg, #2563eb, #7c3aed);
      border: none;
      padding: 0.9rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.8rem;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.3);
    }
    .login-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(95deg, #1d4ed8, #6d28d9);
      box-shadow: 0 12px 22px rgba(37, 99, 235, 0.4);
    }
    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .back-link {
      text-align: center;
      margin-top: 1.8rem;
    }
    .back-link a {
      text-decoration: none;
      color: #2563eb;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }
    .back-link a:hover {
      gap: 10px;
      color: #7c3aed;
    }

    .info-note {
      background: #f1f5f9;
      border-radius: 1rem;
      padding: 0.7rem;
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: #4b5563;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
    }
    .loading-spinner {
      background: white;
      padding: 1.5rem 2rem;
      border-radius: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .loading-spinner i {
      font-size: 2rem;
      color: #2563eb;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 1.6rem;
      }
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="bg-orb">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="login-container">
  <div class="login-header">
    <div class="login-icon">
      <i class="fas fa-chalkboard-user"></i>
    </div>
    <h1>LOGIN GURU</h1>
    <div class="sub">E-MindCare SEMSIRA • SMK Syed Sirajuddin</div>
  </div>

  <form id="loginForm">
    <div class="input-group">
      <label><i class="fas fa-user-circle"></i> Nama Penuh</label>
      <input type="text" class="input-field" id="fullname" placeholder="cth: Puan Sarah binti Abdullah" required autocomplete="off">
    </div>
    <div class="input-group">
      <label><i class="fas fa-id-card"></i> Nombor Kad Pengenalan</label>
      <input type="text" class="input-field" id="icNumber" placeholder="cth: 800101-01-1234" required autocomplete="off">
    </div>
    
    <button type="submit" class="login-btn" id="loginBtn">
      <span>Masuk ke Dashboard</span> <i class="fas fa-arrow-right"></i>
    </button>
  </form>

  <div class="back-link">
    <a href="../index.html"><i class="fas fa-arrow-left"></i> Kembali ke Laman Utama</a>
  </div>
  <div class="info-note">
    <i class="fas fa-shield-alt"></i> Akses hanya untuk guru SMK Syed Sirajuddin.
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner">
    <i class="fas fa-spinner fa-pulse fa-2x"></i>
    <p>Mengesahkan data...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyCfu7XC8pXtpDyQ-9Cjdg4AobA-EVEwWcc",
    authDomain: "e-mindcare.firebaseapp.com",
    projectId: "e-mindcare",
    storageBucket: "e-mindcare.firebasestorage.app",
    messagingSenderId: "1021883944936",
    appId: "1:1021883944936:web:39c75a0c98d19a37afde5d",
    measurementId: "G-3CJVKWGEXV"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const teachersCollection = collection(db, "teachers");

  const form = document.getElementById('loginForm');
  const fullnameInput = document.getElementById('fullname');
  const icInput = document.getElementById('icNumber');
  const loginBtn = document.getElementById('loginBtn');
  const loadingOverlay = document.getElementById('loadingOverlay');

  function showLoading() {
    loadingOverlay.style.visibility = 'visible';
    loginBtn.disabled = true;
  }

  function hideLoading() {
    loadingOverlay.style.visibility = 'hidden';
    loginBtn.disabled = false;
  }

  async function verifyAndRedirect(fullname, icNumber) {
    try {
      const q = query(teachersCollection, where("icNumber", "==", icNumber));
      const querySnapshot = await getDocs(q);
      
      if (querySnapshot.empty) {
        alert("❌ Akaun tidak ditemui! Sila pastikan No. Kad Pengenalan anda telah didaftarkan.");
        hideLoading();
        return false;
      }
      
      let teacherData = null;
      querySnapshot.forEach((doc) => {
        teacherData = { id: doc.id, ...doc.data() };
      });
      
      if (teacherData && teacherData.fullname.toLowerCase() !== fullname.toLowerCase()) {
        alert("❌ Nama Penuh tidak sepadan dengan No. Kad Pengenalan yang didaftarkan.");
        hideLoading();
        return false;
      }
      
      sessionStorage.setItem('teacherId', teacherData.id);
      sessionStorage.setItem('teacherName', teacherData.fullname);
      sessionStorage.setItem('teacherIC', teacherData.icNumber);
      sessionStorage.setItem('teacherClass', teacherData.teacherClass || '-');
      sessionStorage.setItem('teacherYear', teacherData.year || '2026');
      sessionStorage.setItem('teacherLoginTime', new Date().toISOString());
      
      // ✅ REDIRECT TERUS KE URL PENUH YANG ANDA MAHU
      window.location.href = "https://m-9742894.github.io/SEMSIRAUBK2.0/dashboard/guru/dashboard-guru.html";
      return true;
      
    } catch (error) {
      console.error("Firebase error:", error);
      alert("⚠️ Ralat sambungan ke pangkalan data. Sila cuba sebentar lagi.");
      hideLoading();
      return false;
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fullname = fullnameInput.value.trim();
    const icNumber = icInput.value.trim();
    
    if (fullname === "") {
      alert("Sila masukkan Nama Penuh anda.");
      fullnameInput.focus();
      return;
    }
    
    if (icNumber === "") {
      alert("Sila masukkan Nombor Kad Pengenalan.");
      icInput.focus();
      return;
    }
    
    const icPattern = /^[0-9]{2}[0-9]{4}-[0-9]{2}-[0-9]{4}$|^[0-9]{12}$/;
    if (!icPattern.test(icNumber) && icNumber.length < 6) {
      if(!confirm("Nombor Kad Pengenalan tidak mengikut format biasa (cth: 800101-01-1234). Teruskan?")) {
        return;
      }
    }
    
    showLoading();
    await verifyAndRedirect(fullname, icNumber);
  });
</script>
</body>
</html>
